<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 메신저 – 모든 버그 수정</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card-bg: rgba(20,26,36,0.8);
      --text: #e2e8f0; --text-secondary: #94a3b8; --accent: #5b8def;
      --danger: #f87171; --success: #4ade80; --border: #1e293b;
      --radius: 16px; --radius-sm: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 12px;
    }
    .app {
      width: 100%; max-width: 580px; height: 95dvh;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .app-header {
      padding: 14px 20px; background: rgba(15,23,33,0.9);
      backdrop-filter: blur(24px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-header h1 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .connection-status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .status-dot.on { background: var(--success); }
    .status-dot.off { background: var(--danger); }

    .main-view { flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; }
    .main-view::-webkit-scrollbar { width:5px; }
    .main-view::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }

    .card {
      background: var(--card-bg); backdrop-filter: blur(16px);
      border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border);
      padding: 12px 18px; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s; width: 100%;
      text-align: center; backdrop-filter: blur(12px);
    }
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.danger { background: rgba(248,113,113,0.15); color: var(--danger); border-color: var(--danger); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-group { display: flex; gap: 8px; }
    .btn-group .btn { flex:1; }

    input, textarea, select {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: 0.95rem; outline: none;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }

    .room-list { display: flex; flex-direction: column; gap: 8px; }
    .room-item {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.15s;
    }
    .room-item:hover { background: rgba(255,255,255,0.05); }
    .room-info h4 { font-size: 0.95rem; }
    .room-info p { font-size: 0.7rem; color: var(--text-secondary); }
    .room-badge {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
      background: rgba(91,141,239,0.2); color: #93c5fd;
    }

    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .member-list { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
    .member-tag {
      font-size: 0.7rem; background: rgba(255,255,255,0.06);
      padding: 3px 10px; border-radius: 12px;
    }
    .messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
      padding: 8px 0;
    }
    .msg { display: flex; }
    .msg.mine { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 10px 16px; border-radius: 20px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.04);
      word-break: break-word;
    }
    .msg.mine .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .time { font-size: 0.6rem; color: var(--text-secondary); margin-top: 4px; text-align: right; }
    .input-bar { display: flex; gap: 8px; padding-top: 12px; }
    #msgInput { flex:1; }
    .attach-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--accent); }

    .hidden { display: none !important; }
    .text-secondary { color: var(--text-secondary); font-size: 0.8rem; }
    .mt { margin-top: 10px; }
    .mb { margin-bottom: 8px; }
    .spinner {
      width: 20px; height: 20px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>✦ P2P 메신저</h1>
    <div class="connection-status">
      <span id="globalStatusDot" class="status-dot off"></span>
      <span id="globalStatusLabel">오프라인</span>
    </div>
  </div>

  <div class="main-view" id="mainView">
    <!-- 방 목록 화면 -->
    <div id="roomListView" style="display:block;">
      <div class="card">
        <button id="btnNewChat" class="btn primary" onclick="startNewRoom()">✨ 새 채팅</button>
        <div class="btn-group mt">
          <button class="btn" onclick="exportAllData()">📥 백업</button>
          <button class="btn" onclick="document.getElementById('restoreFile').click()">📤 복원</button>
        </div>
        <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="importAllData(event)">
      </div>
      <div id="roomListContainer" class="room-list"></div>
    </div>

    <!-- 방 생성 화면 -->
    <div id="createRoomView" style="display:none;">
      <div class="card">
        <button class="btn" onclick="goBackToRoomList()" style="width:auto;">← 뒤로</button>
        <input type="text" id="newRoomName" placeholder="방 이름" class="mt">
        <select id="newRoomType" class="mt">
          <option value="1:1">1:1 채팅</option>
          <option value="group">그룹 채팅</option>
          <option value="open">오픈 채널</option>
        </select>
        <button id="btnCreateRoom" class="btn primary mt" onclick="createNewRoom()">방 만들기</button>
        <div id="createSpinner" class="hidden mt" style="text-align:center;"><span class="spinner"></span> 생성 중...</div>
      </div>
      <div id="createdRoomInfo" style="display:none;" class="card">
        <p class="text-secondary">아래 링크를 상대에게 보내주세요.</p>
        <div id="inviteLink" style="background:#0f131c; padding:10px; border-radius:10px; word-break:break-all; font-size:0.75rem; margin:6px 0;"></div>
        <button class="btn" onclick="copyInviteLink()">📋 링크 복사</button>
        <p class="text-secondary mt">상대가 Answer 링크를 보내면 여기로 돌아와서 기다리세요.</p>
      </div>
    </div>

    <!-- 자동 참가 (게스트) -->
    <div id="autoJoinView" style="display:none; text-align:center; margin-top:30px;">
      <div class="spinner" id="autoSpinner" style="width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;"></div>
      <p class="text-secondary" id="autoStatus">연결 준비 중...</p>
      <div id="answerLinkPanel" style="display:none;" class="card mt">
        <p class="text-secondary">아래 링크를 <strong>방장에게</strong> 보내주세요.</p>
        <div id="answerLink" style="background:#0f131c; padding:10px; border-radius:10px; word-break:break-all; font-size:0.75rem; margin:6px 0;"></div>
        <button class="btn" onclick="copyAnswerLink()">📋 링크 복사</button>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen" style="display:none; flex-direction:column; flex:1;">
      <div class="chat-header">
        <div>
          <strong id="currentRoomName"></strong>
          <span id="onlineBadge" class="text-secondary" style="margin-left:8px;"></span>
        </div>
        <div class="btn-group" style="width:auto;">
          <button class="btn" onclick="inviteToCurrentRoom()" style="width:auto; padding:8px 14px;">➕ 초대</button>
          <button class="btn danger" onclick="leaveCurrentRoom()" style="width:auto; padding:8px 14px;">나가기</button>
        </div>
      </div>
      <div class="member-list" id="memberList"></div>
      <div class="messages" id="messagesContainer"></div>
      <div class="input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="msgInput" placeholder="메시지 입력..." autocomplete="off">
        <button class="btn primary" onclick="sendMessage()" style="width:auto; padding:10px 18px;">전송</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFileSend(this.files)">
    </div>
  </div>
</div>

  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

function showView(id) {
  document.getElementById('roomListView').style.display = 'none';
  document.getElementById('createRoomView').style.display = 'none';
  document.getElementById('autoJoinView').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'none';

}

function goBackToRoomList() {

// ==================== 새 채팅 시작 (UI 전환) ====================
function startNewRoom() {

  document.getElementById('newRoomName').value = '';
  document.getElementById('newRoomType').value = '1:1';
  document.getElementById('createdRoomInfo').style.display = 'none';

  document.getElementById('createSpinner').classList.add('hidden');

// ==================== 방 만들기 (호스트) ====================
async function createNewRoom() {
  if (isCreating) return;
  const btn = document.getElementById('btnCreateRoom');
  const spinner = document.getElementById('createSpinner');

  // 버튼 비활성화 및 로딩 표시
  isCreating = true;
  btn.disabled = true;
  spinner.classList.remove('hidden');

  const name = document.getElementById('newRoomName').value.trim() || '새 채팅방';
  const type = document.getElementById('newRoomType').value;

  try {
    closeAllPeers(); isOfferer = true;
    activeRoomId = crypto.randomUUID();

    const room = { id: activeRoomId, name, type, createdAt: Date.now(), members: [myPeerId] };
    rooms.push(room);
    saveRooms();

    // Offer 생성 (모든 ICE 서버 사용)
    const pc = new RTCPeerConnection({ iceServers: ALL_ICE_SERVERS });
    const dc = pc.createDataChannel('chat');
    peers['local'] = { pc, dc };
    setupDataChannel(dc, 'local');

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitIce(pc);
    monitorPC(pc, 'local');

    // sessionStorage에 Offer 저장 (재접속 대비)
    sessionStorage.setItem(LAST_OFFER_KEY, JSON.stringify({ roomId: activeRoomId, offer: pc.localDescription }));

    const link = location.origin + location.pathname + '#join=' + activeRoomId + '&offer=' + toBase64URL(JSON.stringify(pc.localDescription));
    document.getElementById('inviteLink').textContent = link;
    document.getElementById('createdRoomInfo').style.display = 'block';
    console.log('🔗 초대 링크 생성:', link);

    // 성공 후 UI 업데이트
    btn.disabled = false;
    spinner.classList.add('hidden');
    isCreating = false;

  } catch (e) {
    console.error('방 생성 실패:', e);
    alert('방 생성에 실패했습니다. 다시 시도해주세요.');
    btn.disabled = false;
    spinner.classList.add('hidden');
    isCreating = false;
  }
}

function copyInviteLink() {
  navigator.clipboard.writeText(document.getElementById('inviteLink').textContent).then(() => alert('복사 완료!'));
}

// ==================== 자동 참가 (게스트) ====================
async function handleHash() {
  const hash = window.location.hash.substring(1);
  console.log('🔍 해시 감지:', hash);
  if (!hash) return;
  const params = new URLSearchParams(hash);

  if (params.has('join') && params.has('offer')) {
    const offerBase64 = params.get('offer');
    const roomId = params.get('join');
    console.log('📦 offer 파라미터 (URL-safe):', offerBase64);
    try {
      const offerJson = fromBase64URL(offerBase64);
      const offer = JSON.parse(offerJson);
      console.log('✅ offer 파싱 성공');

      showAutoJoin();
      document.getElementById('autoSpinner').style.display = 'block';
      document.getElementById('autoStatus').textContent = '연결 준비 중...';
      document.getElementById('answerLinkPanel').style.display = 'none';

      closeAllPeers(); isOfferer = false;
      activeRoomId = roomId;

      let room = rooms.find(r => r.id === roomId);
      if (!room) {
        room = { id: roomId, name: '참가한 채팅방', type: 'group', createdAt: Date.now(), members: [myPeerId] };
        rooms.push(room);
        saveRooms();
      } else if (!room.members.includes(myPeerId)) {
        room.members.push(myPeerId);
        saveRooms();
      }

      const answer = await generateAnswer(offer);
      const answerLink = location.origin + location.pathname + '#ans=' + roomId + '&answer=' + toBase64URL(JSON.stringify(answer));
      document.getElementById('answerLink').textContent = answerLink;
      document.getElementById('answerLinkPanel').style.display = 'block';
      document.getElementById('autoSpinner').style.display = 'none';
      document.getElementById('autoStatus').textContent = 'Answer 링크를 방장에게 보내세요.';
    } catch (e) {
      console.error('❌ offer 파싱 실패:', e);
      document.getElementById('autoStatus').textContent = '초대 링크가 손상되었습니다.';
    }
  } else if (params.has('ans') && params.has('answer')) {
    const answerBase64 = params.get('answer');
    const roomId = params.get('ans');
    console.log('📦 answer 파라미터:', answerBase64);
    try {
      const answerJson = fromBase64URL(answerBase64);
      const answer = JSON.parse(answerJson);
      console.log('✅ answer 파싱 성공');

      // Answer 링크 처리
      if (peers['local'] && activeRoomId === roomId) {
        await peers['local'].pc.setRemoteDescription(answer);
        console.log('✅ Answer 적용 (현재 호스트)');
      } else {
        const stored = sessionStorage.getItem(LAST_OFFER_KEY);
        if (stored) {
          const { offer: storedOffer } = JSON.parse(stored);
          closeAllPeers();
          isOfferer = true;
          activeRoomId = roomId;

          const pc = new RTCPeerConnection({ iceServers: ALL_ICE_SERVERS });
          const dc = pc.createDataChannel('chat');
          peers['local'] = { pc, dc };
          setupDataChannel(dc, 'local');
          await pc.setLocalDescription(storedOffer);
          await pc.setRemoteDescription(answer);
          monitorPC(pc, 'local');
          console.log('✅ 저장된 Offer로 Answer 적용');
        } else {
          alert('저장된 Offer가 없습니다. 방을 먼저 만들거나 초대 링크를 받은 후 Answer를 적용해주세요.');
        }
      }
    } catch (e) {
      console.error('❌ answer 파싱 실패:', e);
      alert('Answer 링크가 올바르지 않습니다.');
    }
  }
}

async function generateAnswer(offer) {
  const pc = new RTCPeerConnection({ iceServers: ALL_ICE_SERVERS });
  const peerId = 'remote-' + Date.now();
  peers[peerId] = { pc, dc: null };
  pc.ondatachannel = e => setupDataChannel(e.channel, peerId);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce(pc);
  monitorPC(pc, peerId);
  return pc.localDescription;
}

function copyAnswerLink() {
  navigator.clipboard.writeText(document.getElementById('answerLink').textContent).then(() => alert('복사 완료!'));
}

// ==================== WebRTC 헬퍼 ====================
function setupDataChannel(dc, peerId) {
  dc.onopen = () => {
    if (peerId !== 'local' && !connectedPeers.includes(peerId)) {
      connectedPeers.push(peerId);
      updateMemberListUI();
      const room = rooms.find(r => r.id === activeRoomId);
      if (room && !room.members.includes(peerId)) {
        room.members.push(peerId);
        saveRooms();
      }
    }
    updateOnlineStatus();
    if (!sharedKey) startHandshake(dc);
    console.log(`📞 데이터 채널 오픈 (${peerId})`);
  };
  dc.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'handshake') handleHandshake(data, dc);
    else if (data.type === 'msg') decrypt(data).then(p => appendMessage(p, 'other')).catch(() => appendMessage('⚠️ 복호화 실패', 'system'));
  };
  dc.onclose = () => {
    if (peerId !== 'local') {
      connectedPeers = connectedPeers.filter(id => id !== peerId);
      updateMemberListUI();
      updateOnlineStatus();
    }
  };
  if (peers[peerId]) peers[peerId].dc = dc;
}

function monitorPC(pc, peerId) {
  pc.oniceconnectionstatechange = () => {
    console.log(`🔌 ICE 상태 (${peerId}): ${pc.iceConnectionState}`);
    if (pc.iceConnectionState === 'connected') {
      if (!activeRoomId) return;
      enterRoom(activeRoomId);
    } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      if (peerId !== 'local') {
        connectedPeers = connectedPeers.filter(id => id !== peerId);
        updateMemberListUI();
        updateOnlineStatus();
      }
    }
  };
}

// ==================== ECDH 핸드셰이크 ====================
async function startHandshake(dc) {
  const eph = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveBits']);
  peers['_eph'] = { private: eph.privateKey, public: eph.publicKey };
  dc.send(JSON.stringify({ type: 'handshake', pub: await crypto.subtle.exportKey('jwk', eph.publicKey) }));
}

async function handleHandshake(data, dc) {
  if (!data.pub) return;
  try {
    const remotePub = await crypto.subtle.importKey('jwk', data.pub, { name: 'ECDH', namedCurve: 'P-521' }, false, []);
    if (!peers['_eph']) {
      const eph = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveBits']);
      peers['_eph'] = { private: eph.privateKey, public: eph.publicKey };
      dc.send(JSON.stringify({ type: 'handshake', pub: await crypto.subtle.exportKey('jwk', eph.publicKey) }));
    }
    const shared = await crypto.subtle.deriveBits({ name: 'ECDH', public: remotePub }, peers['_eph'].private, 256);
    sharedKey = await crypto.subtle.importKey('raw', shared, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
    delete peers['_eph'];
    console.log('🔐 암호화 키 교환 완료');
  } catch (e) { console.error(e); }
}

// ==================== 메시지 ====================
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !sharedKey) return;
  const encrypted = await encrypt(text);
  Object.values(peers).forEach(({ dc }) => {
    if (dc && dc.readyState === 'open') dc.send(JSON.stringify({ type: 'msg', ...encrypted }));
  });
  appendMessage(text, 'mine');
  saveLocalMessage(text, myPeerId);
  input.value = '';
}

function saveLocalMessage(text, sender) {
  if (!activeRoomId) return;
  const msgs = loadMessages(activeRoomId);
  msgs.push({ text, sender, time: Date.now() });
  saveMessages(activeRoomId, msgs);
}

function appendMessage(text, type) {
  const c = document.getElementById('messagesContainer');
  const d = document.createElement('div');
  d.className = `msg ${type}`;
  d.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

async function encrypt(plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, new TextEncoder().encode(plaintext));
  return { iv: Array.from(iv), ct: Array.from(new Uint8Array(ct)) };
}

async function decrypt(data) {
  const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct);
  const buf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
  return new TextDecoder().decode(buf);
}

// ==================== 방 입장 (UI) ====================
function enterRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;
  activeRoomId = roomId;
  document.getElementById('currentRoomName').textContent = room.name;
  document.getElementById('messagesContainer').innerHTML = '';
  loadMessages(roomId).forEach(msg => appendMessage(msg.text, msg.sender === myPeerId ? 'mine' : 'other'));
  updateMemberListUI();
  updateOnlineStatus();
  showChat();
}

// ==================== 초대 / 나가기 ====================
async function inviteToCurrentRoom() {
  if (!activeRoomId || !isOfferer) {
    alert('방장만 초대할 수 있습니다.');
    return;
  }
  // 기존 피어가 있는지 확인
  if (!peers['local']) {
    alert('연결이 끊겼습니다. 방을 다시 열어주세요.');
    return;
  }
  const offer = peers['local'].pc.localDescription;
  const link = location.origin + location.pathname + '#join=' + activeRoomId + '&offer=' + toBase64URL(JSON.stringify(offer));
  prompt('초대 링크를 복사하세요:', link);
}

function leaveCurrentRoom() {
  closeAllPeers();
  activeRoomId = null;
  sharedKey = null;
  showRoomList();
}

function closeAllPeers() {
  Object.values(peers).forEach(({ pc }) => pc.close());
  peers = {};
  connectedPeers = [];
}

// ==================== UI 갱신 ====================
function updateMemberListUI() {
  const room = rooms.find(r => r.id === activeRoomId);
  if (!room) return;
  document.getElementById('memberList').innerHTML = room.members.map(id => {
    const isMe = id === myPeerId, isOnline = id === 'local' || connectedPeers.includes(id);
    return `<span class="member-tag" style="opacity:${isOnline ? 1 : 0.5}">${isMe ? '나' : id.slice(0, 6)} ${isOnline ? '●' : '○'}</span>`;
  }).join('');
}

function updateOnlineStatus() {
  const online = connectedPeers.length > 0;
  document.getElementById('globalStatusDot').className = 'status-dot ' + (online ? 'on' : 'off');
  document.getElementById('globalStatusLabel').textContent = online ? `${connectedPeers.length}명 연결됨` : '오프라인';
}

// ==================== 백업/복원 ====================
function exportAllData() {
  const backup = rooms.map(r => ({ ...r, messages: loadMessages(r.id) }));
  const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `p2p-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
}

async function importAllData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    if (confirm('기존 데이터를 덮어쓰겠습니까? (취소: 병합)')) rooms = [];
    data.forEach(room => {
      const ex = rooms.find(r => r.id === room.id);
      if (ex) {
        Object.assign(ex, room);
        if (room.messages) saveMessages(room.id, room.messages);
      } else {
        rooms.push(room);
        if (room.messages) saveMessages(room.id, room.messages);
      }
    });
    saveRooms();
    renderRoomList();
    alert('복원 완료!');
  } catch (e) { alert('올바른 백업 파일이 아닙니다.'); }
  e.target.value = '';
}

// ==================== 유틸 ====================
function waitIce(pc) {
  return new Promise(r => {
    if (pc.iceGatheringState === 'complete') r();
    else pc.addEventListener('icegatheringstatechange', () => pc.iceGatheringState === 'complete' && r());
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
}

// ==================== 초기화 ====================
loadRooms();
showRoomList();
window.addEventListener('hashchange', handleHash);
handleHash();
