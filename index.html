<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 메신저 – 완전판</title>
  <style>
    :root {
      --bg: #0a0e14; --surface: #131a24; --card: rgba(19,26,36,0.9);
      --text: #e2e8f0; --sub: #94a3b8; --accent: #5b8def;
      --border: #1f2937; --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display:flex; justify-content:center; align-items:center; min-height:100dvh; padding:8px; }
    .app { width:100%; max-width:560px; height:96dvh; background:var(--surface); border-radius:24px; box-shadow:0 20px 50px rgba(0,0,0,0.7); display:flex; flex-direction:column; overflow:hidden; border:1px solid var(--border); }
    .top-bar { padding:14px 18px; background:rgba(19,26,36,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .top-bar h2 { font-size:1.2rem; font-weight:700; background:linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-led { display:flex; align-items:center; gap:6px; font-size:0.8rem; }
    .led { width:10px; height:10px; border-radius:50%; }
    .led.on { background:#4ade80; } .led.off { background:#f87171; }
    .content { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; }
    .content::-webkit-scrollbar { width:4px; } .content::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    .panel { background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:10px; border:1px solid var(--border); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:5px; background:rgba(255,255,255,0.06); color:white; border:1px solid var(--border); padding:10px 16px; border-radius:12px; cursor:pointer; font-weight:600; font-size:0.9rem; transition:all 0.2s; text-align:center; }
    .btn:hover { background:rgba(255,255,255,0.12); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.sm { padding:6px 12px; font-size:0.8rem; width:auto; }
    .btn-group { display:flex; gap:6px; flex-wrap:wrap; }
    input[type=text], input[type=password], textarea {
      width:100%; background:#0c1219; color:var(--text); border:1px solid var(--border);
      border-radius:12px; padding:10px 14px; font-size:0.9rem; outline:none;
    }
    input:focus, textarea:focus { border-color:var(--accent); }

    .room-list { display:flex; flex-direction:column; gap:6px; }
    .room-item {
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:12px; padding:12px; display:flex; justify-content:space-between; align-items:center;
      cursor:pointer; transition:background 0.2s;
    }
    .room-item:hover { background:rgba(255,255,255,0.06); }
    .room-name { font-weight:600; }
    .room-meta { font-size:0.7rem; color:var(--sub); }

    .chat-area { display:none; flex-direction:column; flex:1; }
    .chat-header { display:flex; justify-content:space-between; align-items:center; padding:4px 0; }
    .messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px; padding:6px 0; }
    .msg { display:flex; }
    .msg.me { justify-content:flex-end; }
    .bubble { max-width:80%; padding:8px 14px; border-radius:16px; background:rgba(30,38,53,0.9); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.05); }
    .msg.me .bubble { background:linear-gradient(135deg,rgba(59,130,246,0.45),rgba(139,92,246,0.45)); border-bottom-right-radius:4px; }
    .time { font-size:0.6rem; color:var(--sub); margin-top:2px; text-align:right; }
    .input-row { display:flex; gap:8px; padding:8px 0 0; }
    #msgInput { flex:1; }
    .member-tags { display:flex; gap:4px; flex-wrap:wrap; margin:4px 0; }
    .member-tag { background:rgba(91,141,239,0.2); padding:2px 10px; border-radius:12px; font-size:0.7rem; }

    .hidden { display:none !important; }
    .text-sub { color:var(--sub); font-size:0.8rem; }
    .mt { margin-top:8px; }
    .link-box { word-break:break-all; background:#0c1219; padding:8px; border-radius:8px; font-size:0.7rem; margin:6px 0; }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h2>✦ P2P 메신저</h2>
    <div class="status-led"><span id="connLed" class="led off"></span><span id="connLabel">오프라인</span></div>
  </div>
  <div class="content" id="content">
    <!-- 메인: 채팅방 목록 -->
    <div id="mainScreen">
      <div class="panel">
        <div class="btn-group">
          <button class="btn primary" onclick="showCreateRoom()">✨ 새 방</button>
          <button class="btn" onclick="showJoinRoom()">📩 코드로 참가</button>
          <button class="btn sm" onclick="exportAll()">📥 백업</button>
          <button class="btn sm" onclick="document.getElementById('restoreInput').click()">📤 복원</button>
        </div>
        <input type="file" id="restoreInput" accept=".json" class="hidden" onchange="importAll(event)">
      </div>
      <div id="roomList" class="room-list"></div>
    </div>

    <!-- 방 만들기 -->
    <div id="createScreen" class="hidden">
      <div class="panel">
        <button class="btn sm" onclick="showMain()">← 뒤로</button>
        <input type="text" id="roomName" placeholder="방 이름" class="mt">
        <input type="password" id="roomPassword" placeholder="암호 (참가자와 공유)" class="mt">
        <select id="roomType" class="mt" style="background:#0c1219;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:10px;">
          <option value="1:1">1:1 채팅</option>
          <option value="group">그룹 채팅</option>
          <option value="open">오픈 채팅</option>
        </select>
        <button class="btn primary mt" onclick="createRoom()">방 만들기</button>
      </div>
      <div id="createdInfo" class="panel hidden">
        <strong>초대 링크</strong>
        <div class="link-box" id="createdLink"></div>
        <button class="btn mt" onclick="copyLink('createdLink')">📋 복사</button>
      </div>
    </div>

    <!-- 코드로 참가 -->
    <div id="joinScreen" class="hidden">
      <div class="panel">
        <button class="btn sm" onclick="showMain()">← 뒤로</button>
        <input type="password" id="joinPassword" placeholder="방 암호" class="mt">
        <textarea id="joinOffer" placeholder="초대 코드 붙여넣기" class="mt" rows="2"></textarea>
        <button class="btn primary mt" onclick="joinRoom()">참가</button>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen" class="chat-area">
      <div class="chat-header">
        <span id="roomTitle" style="font-weight:600;"></span>
        <span id="onlineBadge" class="text-sub"></span>
        <div>
          <button class="btn sm" onclick="invite()">➕</button>
          <button class="btn sm" onclick="leaveRoom()">나가기</button>
        </div>
      </div>
      <div class="member-tags" id="memberTags"></div>
      <div class="messages" id="messages"></div>
      <div class="input-row">
        <input type="text" id="msgInput" placeholder="메시지 (암호화됨)" autocomplete="off">
        <button class="btn primary sm" onclick="sendText()">전송</button>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== 데이터 스토어 ====================
const ROOMS_KEY = 'p2prooms';
let rooms = JSON.parse(localStorage.getItem(ROOMS_KEY) || '[]');
let currentRoom = null;
let sharedKey = null;
let peers = {}; // peerId -> { pc, dc, peerId }
let myId = 'me-' + crypto.randomUUID().substring(0,6);
let messageCache = {}; // roomId -> [{id, text, sender, time}]

// 메시지 로드/저장
function loadMsgs(rid) { return JSON.parse(localStorage.getItem('msgs_'+rid) || '[]'); }
function saveMsgs(rid, msgs) { localStorage.setItem('msgs_'+rid, JSON.stringify(msgs.slice(-500))); }

function saveRooms() { localStorage.setItem(ROOMS_KEY, JSON.stringify(rooms)); }

// ==================== 화면 전환 ====================
function showMain() {
  document.getElementById('mainScreen').classList.remove('hidden');
  document.getElementById('createScreen').classList.add('hidden');
  document.getElementById('joinScreen').classList.add('hidden');
  document.getElementById('chatScreen').style.display = 'none';
  renderRoomList();
}
function showCreateRoom() {
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('createScreen').classList.remove('hidden');
  document.getElementById('createdInfo').classList.add('hidden');
}
function showJoinRoom() {
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('joinScreen').classList.remove('hidden');
}
function showChat(room) {
  document.getElementById('mainScreen').classList.add('hidden');
  document.getElementById('createScreen').classList.add('hidden');
  document.getElementById('joinScreen').classList.add('hidden');
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('roomTitle').textContent = room.name;
  document.getElementById('messages').innerHTML = '';
  currentRoom = room;
  updateMembersUI();
  // 기존 메시지 표시
  const msgs = loadMsgs(room.id);
  msgs.forEach(m => addMessage(m.text, m.sender === myId ? 'me' : 'other', m.sender));
}
function updateMembersUI() {
  const tags = document.getElementById('memberTags');
  const ids = Object.keys(peers);
  tags.innerHTML = ids.map(id => `<span class="member-tag">${id.substring(0,6)}</span>`).join('');
  document.getElementById('onlineBadge').textContent = `${ids.length+1}명 접속`;
}

// ==================== 백업/복원 ====================
function exportAll() {
  const backup = {
    rooms: rooms.map(r => ({...r, messages: loadMsgs(r.id)})),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(backup)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'p2pchat-backup.json'; a.click();
}
async function importAll(e) {
  const file = e.target.files[0]; if(!file) return;
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    if(!data.rooms) throw new Error();
    if(confirm('기존 방 목록을 덮어쓰시겠습니까?')) rooms = [];
    data.rooms.forEach(r => {
      const exist = rooms.find(room => room.id === r.id);
      if(exist) {
        exist.name = r.name; exist.password = r.password;
        exist.members = [...new Set([...(exist.members||[]), ...(r.members||[])])];
      } else rooms.push({id:r.id, name:r.name, password:r.password, type:r.type||'group', createdAt:r.createdAt});
      if(r.messages) saveMsgs(r.id, r.messages);
    });
    saveRooms(); renderRoomList(); alert('복원 완료');
  } catch(_) { alert('잘못된 파일입니다.'); }
  e.target.value = '';
}

// ==================== 방 생성 ====================
async function createRoom() {
  const name = document.getElementById('roomName').value.trim() || '채팅방';
  const password = document.getElementById('roomPassword').value;
  const type = document.getElementById('roomType').value;
  if(!password) return alert('암호를 입력하세요.');
  await deriveKey(password);
  const room = { id: crypto.randomUUID(), name, password, type, createdAt: Date.now() };
  rooms.push(room); saveRooms();
  // Offer 생성 (첫 피어가 없으므로 대기 상태)
  const offer = await createLocalOffer();
  const link = location.origin+location.pathname+'#join='+room.id+'&offer='+btoa(JSON.stringify(offer));
  document.getElementById('createdLink').textContent = link;
  document.getElementById('createdInfo').classList.remove('hidden');
  currentRoom = room;
  showChat(room);
}
async function joinRoom() {
  const password = document.getElementById('joinPassword').value;
  const offerStr = document.getElementById('joinOffer').value.trim();
  if(!password) return alert('암호를 입력하세요.');
  let offer;
  if(offerStr) { try{offer=JSON.parse(offerStr);}catch(e){return alert('코드 오류');} }
  else {
    const hash = location.hash.substring(1);
    const p = new URLSearchParams(hash);
    if(p.has('offer')) { try{offer=JSON.parse(atob(p.get('offer')));}catch(e){return alert('링크 오류');} }
    else return alert('초대 코드를 입력하세요.');
  }
  await deriveKey(password);
  const remotePeerId = 'peer-'+crypto.randomUUID().substring(0,6);
  await connectToPeer(offer, remotePeerId);
  const rid = new URLSearchParams(location.hash.substring(1)).get('join') || crypto.randomUUID();
  let room = rooms.find(r=>r.id===rid);
  if(!room) { room = {id:rid, name:'참가한 방', password, type:'group', createdAt:Date.now()}; rooms.push(room); saveRooms(); }
  currentRoom = room;
  showChat(room);
}

// ==================== WebRTC Peer 관리 ====================
async function createLocalOffer() {
  const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.services.mozilla.com:3478'}]});
  const dc = pc.createDataChannel('chat');
  setupDC(dc, 'local');
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitIce(pc);
  peers['local'] = {pc, dc, peerId:'local'};
  return pc.localDescription;
}
async function connectToPeer(offer, pid) {
  const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.services.mozilla.com:3478'}]});
  pc.ondatachannel = e => setupDC(e.channel, pid);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce(pc);
  peers[pid] = {pc, dc:null, peerId:pid};
}
function setupDC(dc, pid) {
  dc.onopen = () => {
    if(!peers[pid]) peers[pid] = {pc:null, dc, peerId:pid};
    else peers[pid].dc = dc;
    updateMembersUI();
    // 새 피어에게 기존 피어 목록 브로드캐스트
    if(currentRoom) broadcastPeerList();
  };
  dc.onmessage = e => handleMsg(e, pid);
}
function handleMsg(e, fromId) {
  if(e.data instanceof ArrayBuffer) return;
  const d = JSON.parse(e.data);
  if(d.type==='text') {
    decrypt(d).then(txt => {
      addMessage(txt, 'other', fromId);
      saveMessage(currentRoom.id, {text:txt, sender:fromId, time:Date.now()});
    }).catch(()=>{});
  } else if(d.type==='peerList') {
    // 수신한 피어 목록으로 추가 연결 시도
    d.list.forEach(pid => {
      if(pid !== myId && !peers[pid]) {
        // 해당 피어에게 연결 요청 (간접 시그널링)
        requestConnectionTo(pid);
      }
    });
  }
}
async function requestConnectionTo(targetId) {
  // 이미 연결된 임의의 피어를 통해 시그널링 릴레이
  const relay = Object.values(peers).find(p => p.dc && p.dc.readyState==='open');
  if(!relay) return;
  const localPc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.services.mozilla.com:3478'}]});
  const localDc = localPc.createDataChannel('chat');
  setupDC(localDc, targetId);
  const offer = await localPc.createOffer();
  await localPc.setLocalDescription(offer);
  await waitIce(localPc);
  // 릴레이에게 타겟에게 전달할 offer 전송
  relay.dc.send(JSON.stringify({type:'relayOffer', target:targetId, offer:localPc.localDescription}));
  peers[targetId] = {pc:localPc, dc:localDc, peerId:targetId};
}
function broadcastPeerList() {
  const list = Object.keys(peers).filter(id => id!=='local');
  const msg = JSON.stringify({type:'peerList', list});
  Object.values(peers).forEach(p => { if(p.dc && p.dc.readyState==='open') p.dc.send(msg); });
}

// 메시지 브로드캐스트
async function sendText() {
  const input = document.getElementById('msgInput');
  const txt = input.value.trim();
  if(!txt || !sharedKey) return;
  const enc = await encrypt(txt);
  const msg = JSON.stringify({type:'text', ...enc});
  Object.values(peers).forEach(p => { if(p.dc && p.dc.readyState==='open') p.dc.send(msg); });
  addMessage(txt, 'me', myId);
  saveMessage(currentRoom.id, {text:txt, sender:myId, time:Date.now()});
  input.value = '';
}

// ==================== 암호화 ====================
async function deriveKey(pw) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  sharedKey = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:new TextEncoder().encode('p2p-salt'), iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
  );
}
async function encrypt(txt) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, sharedKey, new TextEncoder().encode(txt));
  return {iv:Array.from(iv), ct:Array.from(new Uint8Array(ct))};
}
async function decrypt(data) {
  const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, sharedKey, ct);
  return new TextDecoder().decode(buf);
}

// ==================== UI 헬퍼 ====================
function addMessage(txt, who, sender) {
  const c = document.getElementById('messages');
  const d = document.createElement('div'); d.className = 'msg '+(who==='me'?'me':'other');
  d.innerHTML = `<div class="bubble">${escHtml(txt)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function saveMessage(rid, msgObj) {
  const msgs = loadMsgs(rid); msgs.push(msgObj); saveMsgs(rid, msgs);
}
function renderRoomList() {
  const list = document.getElementById('roomList');
  list.innerHTML = rooms.length===0 ? '<p class="text-sub">채팅방이 없습니다.</p>' : '';
  rooms.forEach(r => {
    const div = document.createElement('div'); div.className='room-item';
    div.innerHTML = `<div><span class="room-name">${escHtml(r.name)}</span><br><span class="room-meta">${r.type} · ${r.createdAt ? new Date(r.createdAt).toLocaleDateString() : ''}</span></div>`;
    div.onclick = () => enterRoom(r.id);
    list.appendChild(div);
  });
}
async function enterRoom(rid) {
  const room = rooms.find(r=>r.id===rid); if(!room) return;
  await deriveKey(room.password);
  currentRoom = room;
  showChat(room);
}
function invite() {
  const offer = peers['local']?.pc?.localDescription;
  if(!offer) return alert('아직 연결 준비 중입니다.');
  const link = location.origin+location.pathname+'#join='+currentRoom.id+'&offer='+btoa(JSON.stringify(offer));
  prompt('초대 링크 복사 (Ctrl+C)', link);
}
function leaveRoom() {
  Object.values(peers).forEach(p => p.pc?.close());
  peers = {}; currentRoom = null;
  showMain();
}
function copyLink(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(()=>alert('복사 완료'));
}
function escHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function waitIce(pc) { return new Promise(r=>{ if(pc.iceGatheringState==='complete')r(); else pc.addEventListener('icegatheringstatechange', ()=>pc.iceGatheringState==='complete'&&r()); }); }

// ==================== 링크 자동 처리 ====================
window.addEventListener('hashchange', () => {
  const p = new URLSearchParams(location.hash.substring(1));
  if(p.has('offer')) {
    document.getElementById('joinOffer').value = atob(p.get('offer'));
    showJoinRoom();
  }
});
window.addEventListener('load', () => {
  renderRoomList();
  const p = new URLSearchParams(location.hash.substring(1));
  if(p.has('offer')) {
    document.getElementById('joinOffer').value = atob(p.get('offer'));
    showJoinRoom();
  }
});
</script>
</body>
</html>
