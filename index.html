<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 메신저 – 원클릭 연결</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card-bg: rgba(20,26,36,0.8);
      --text: #e2e8f0; --text-secondary: #94a3b8; --accent: #5b8def;
      --danger: #f87171; --success: #4ade80; --border: #1e293b;
      --radius: 16px; --radius-sm: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 12px;
    }
    .app {
      width: 100%; max-width: 580px; height: 95dvh;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .app-header {
      padding: 14px 20px; background: rgba(15,23,33,0.9);
      backdrop-filter: blur(24px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-header h1 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .connection-status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .status-dot.on { background: var(--success); }
    .status-dot.off { background: var(--danger); }

    .main-view { flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; }
    .main-view::-webkit-scrollbar { width:5px; }
    .main-view::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }

    .card {
      background: var(--card-bg); backdrop-filter: blur(16px);
      border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border);
      padding: 12px 18px; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s; width: 100%;
      text-align: center; backdrop-filter: blur(12px);
    }
    .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.danger { background: rgba(248,113,113,0.15); color: var(--danger); border-color: var(--danger); }
    .btn-group { display: flex; gap: 8px; }
    .btn-group .btn { flex:1; }

    input, textarea, select {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: 0.95rem; outline: none;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }

    .room-list { display: flex; flex-direction: column; gap: 8px; }
    .room-item {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.15s;
    }
    .room-item:hover { background: rgba(255,255,255,0.05); }
    .room-info h4 { font-size: 0.95rem; }
    .room-info p { font-size: 0.7rem; color: var(--text-secondary); }
    .room-badge {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
      background: rgba(91,141,239,0.2); color: #93c5fd;
    }

    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }
    .member-list { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
    .member-tag {
      font-size: 0.7rem; background: rgba(255,255,255,0.06);
      padding: 3px 10px; border-radius: 12px;
    }
    .messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
      padding: 8px 0;
    }
    .msg { display: flex; }
    .msg.mine { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 10px 16px; border-radius: 20px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.04);
      word-break: break-word;
    }
    .msg.mine .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .time { font-size: 0.6rem; color: var(--text-secondary); margin-top: 4px; text-align: right; }
    .input-bar { display: flex; gap: 8px; padding-top: 12px; }
    #msgInput { flex:1; }
    .attach-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--accent); }

    .hidden { display: none !important; }
    .text-secondary { color: var(--text-secondary); font-size: 0.8rem; }
    .mt { margin-top: 10px; }
    .mb { margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>✦ P2P 메신저</h1>
    <div class="connection-status">
      <span id="globalStatusDot" class="status-dot off"></span>
      <span id="globalStatusLabel">오프라인</span>
    </div>
  </div>

  <div class="main-view" id="mainView">
    <!-- 방 목록 화면 -->
    <div id="roomListView" style="display:block;">
      <div class="card">
        <div class="btn-group">
          <button class="btn primary" onclick="showCreateRoom()">✨ 새 채팅</button>
          <button class="btn" onclick="showJoinRoom()">📩 코드로 참가</button>
        </div>
        <div class="btn-group mt">
          <button class="btn" onclick="exportAllData()">📥 전체 백업</button>
          <button class="btn" onclick="document.getElementById('restoreFile').click()">📤 복원</button>
        </div>
        <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="importAllData(event)">
      </div>
      <div id="roomListContainer" class="room-list"></div>
    </div>

    <!-- 방 생성 화면 -->
    <div id="createRoomView" style="display:none;">
      <div class="card">
        <button class="btn" onclick="showRoomList()" style="width:auto;">← 뒤로</button>
        <input type="text" id="newRoomName" placeholder="방 이름" class="mt">
        <select id="newRoomType" class="mt">
          <option value="1:1">1:1 채팅</option>
          <option value="group">그룹 채팅</option>
          <option value="open">오픈 채널</option>
        </select>
        <input type="password" id="newRoomPassword" placeholder="방 암호" class="mt">
        <button class="btn primary mt" onclick="createNewRoom()">방 만들기</button>
      </div>
      <div id="createdRoomInfo" style="display:none;" class="card">
        <p class="text-secondary">아래 링크를 상대에게 보내면 바로 연결됩니다.</p>
        <div id="inviteLink" style="background:#0f131c; padding:10px; border-radius:10px; word-break:break-all; font-size:0.75rem; margin:6px 0;"></div>
        <button class="btn" onclick="copyInviteLink()">📋 링크 복사</button>
      </div>
    </div>

    <!-- 방 참가 화면 (수동용) -->
    <div id="joinRoomView" style="display:none;">
      <div class="card">
        <button class="btn" onclick="showRoomList()" style="width:auto;">← 뒤로</button>
        <input type="password" id="joinPassword" placeholder="방 암호" class="mt">
        <textarea id="joinOfferCode" placeholder="또는 초대 코드 전체를 붙여넣으세요" class="mt" rows="3"></textarea>
        <button class="btn primary mt" onclick="joinRoomViaCode()">참가</button>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen" style="display:none; flex-direction:column; flex:1;">
      <div class="chat-header">
        <div>
          <strong id="currentRoomName"></strong>
          <span id="onlineBadge" class="text-secondary" style="margin-left:8px;"></span>
        </div>
        <div class="btn-group" style="width:auto;">
          <button class="btn" onclick="inviteToCurrentRoom()" style="width:auto; padding:8px 14px;">➕ 초대</button>
          <button class="btn danger" onclick="leaveCurrentRoom()" style="width:auto; padding:8px 14px;">나가기</button>
        </div>
      </div>
      <div class="member-list" id="memberList"></div>
      <div class="messages" id="messagesContainer"></div>
      <div class="input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="msgInput" placeholder="메시지 입력..." autocomplete="off">
        <button class="btn primary" onclick="sendMessage()" style="width:auto; padding:10px 18px;">전송</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFileSend(this.files)">
    </div>
  </div>
</div>

<script>
// ==================== 전역 상태 ====================
const ROOMS_KEY = 'p2p_rooms_v9';
const MSG_PREFIX = 'p2p_msg_';

let rooms = [];
let activeRoomId = null;
let activePassword = null;
let sharedKey = null;
let myPeerId = 'peer-' + crypto.randomUUID().slice(0,8);
let peers = {};
let connectedPeers = [];

// 초기화
loadRooms();
showRoomList();
window.addEventListener('hashchange', handleHash);
handleHash(); // 최초 해시 확인 (자동 참가)

// ==================== 데이터 ====================
function loadRooms() {
  rooms = JSON.parse(localStorage.getItem(ROOMS_KEY) || '[]');
}
function saveRooms() {
  localStorage.setItem(ROOMS_KEY, JSON.stringify(rooms));
}
function loadMessages(roomId) {
  return JSON.parse(localStorage.getItem(MSG_PREFIX + roomId) || '[]');
}
function saveMessages(roomId, msgs) {
  localStorage.setItem(MSG_PREFIX + roomId, JSON.stringify(msgs.slice(-500)));
}

// ==================== 뷰 전환 ====================
function showView(viewId) {
  document.getElementById('roomListView').style.display = 'none';
  document.getElementById('createRoomView').style.display = 'none';
  document.getElementById('joinRoomView').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'none';

  if (viewId === 'chatScreen') {
    document.getElementById('chatScreen').style.display = 'flex';
  } else if (viewId) {
    document.getElementById(viewId).style.display = 'block';
  }
}

function showRoomList() { showView('roomListView'); renderRoomList(); }
function showCreateRoom() { showView('createRoomView'); }
function showJoinRoom() { showView('joinRoomView'); }
function showChat() { showView('chatScreen'); }

function renderRoomList() {
  const container = document.getElementById('roomListContainer');
  if (!rooms.length) {
    container.innerHTML = '<p class="text-secondary" style="text-align:center; margin-top:30px;">아직 채팅방이 없습니다.</p>';
    return;
  }
  container.innerHTML = rooms.map(room => `
    <div class="room-item" onclick="enterRoom('${room.id}')">
      <div class="room-info">
        <h4>${escapeHtml(room.name)}</h4>
        <p>${room.type === '1:1' ? '1:1 채팅' : room.type === 'group' ? '그룹 채팅' : '오픈 채널'} · 멤버 ${room.members.length}명</p>
      </div>
      <span class="room-badge">${room.type === '1:1' ? '1:1' : room.type === 'group' ? '그룹' : '오픈'}</span>
    </div>
  `).join('');
}

// ==================== 방 생성 ====================
async function createNewRoom() {
  const name = document.getElementById('newRoomName').value.trim() || '새 채팅방';
  const type = document.getElementById('newRoomType').value;
  const password = document.getElementById('newRoomPassword').value;
  if (!password) return alert('방 암호를 설정하세요.');

  closeAllPeers();

  const room = {
    id: crypto.randomUUID(),
    name, type, password,
    createdAt: Date.now(),
    members: [myPeerId]
  };
  rooms.push(room);
  saveRooms();
  activePassword = password;
  await deriveKey(password);

  await createLocalOfferForRoom(room.id);
  const offer = peers['local'].pc.localDescription;

  // 링크에 방 ID, Offer, 암호를 모두 포함
  const link = `${location.origin}${location.pathname}#join=${room.id}&offer=${btoa(JSON.stringify(offer))}&pw=${encodeURIComponent(password)}`;
  document.getElementById('inviteLink').textContent = link;
  document.getElementById('createdRoomInfo').style.display = 'block';

  enterRoom(room.id);
}

function copyInviteLink() {
  const link = document.getElementById('inviteLink').textContent;
  navigator.clipboard.writeText(link).then(() => alert('복사 완료!'));
}

// ==================== 자동 참가 (원클릭) ====================
async function handleHash() {
  const hash = window.location.hash.substring(1);
  if (!hash) return;
  const params = new URLSearchParams(hash);
  if (params.has('join') && params.has('offer') && params.has('pw')) {
    // 자동 참가 모드
    const offerBase64 = params.get('offer');
    const roomId = params.get('join');
    const password = params.get('pw');

    // 오퍼와 암호를 자동으로 처리
    try {
      const offerObj = JSON.parse(atob(offerBase64));
      closeAllPeers();
      activePassword = password;
      await deriveKey(password);

      const peerId = 'remote-' + Date.now();
      await connectToPeer(offerObj, peerId);

      let room = rooms.find(r => r.id === roomId);
      if (!room) {
        room = { id: roomId, name: '참가한 채팅방', type: 'group', password, createdAt: Date.now(), members: [myPeerId] };
        rooms.push(room);
        saveRooms();
      } else if (!room.members.includes(myPeerId)) {
        room.members.push(myPeerId);
        saveRooms();
      }

      // 바로 채팅 UI로
      enterRoom(roomId);
      // 해시 제거 (UI 깔끔하게)
      history.replaceState(null, null, window.location.pathname);
    } catch (e) {
      alert('자동 참가에 실패했습니다. 링크가 만료되었거나 잘못되었습니다.');
    }
  } else if (params.has('offer')) {
    // 수동 참가를 위해 코드 자동 입력
    document.getElementById('joinOfferCode').value = atob(params.get('offer'));
    showJoinRoom();
  }
}

// ==================== 수동 참가 (기존 코드) ====================
async function joinRoomViaCode() {
  // ... (기존 코드와 동일, 필요시 handleHash에서 자동화하므로 생략 가능)
  // 여기서는 간단히 handleHash에 의존하고, 수동은 offer만 입력하도록
  const password = document.getElementById('joinPassword').value;
  const code = document.getElementById('joinOfferCode').value.trim();
  if (!password || !code) return alert('암호와 초대 코드를 입력하세요.');

  let offerObj;
  if (code.startsWith('http')) {
    const url = new URL(code);
    const params = new URLSearchParams(url.hash.substring(1));
    offerObj = JSON.parse(atob(params.get('offer')));
  } else {
    offerObj = JSON.parse(code);
  }

  closeAllPeers();
  activePassword = password;
  await deriveKey(password);
  await connectToPeer(offerObj, 'remote-' + Date.now());

  // 방 생성 또는 참가
  const roomId = crypto.randomUUID();
  const room = { id: roomId, name: '수동 참가방', type: 'group', password, createdAt: Date.now(), members: [myPeerId] };
  rooms.push(room);
  saveRooms();
  enterRoom(roomId);
}

// ==================== 방 입장 (UI만) ====================
function enterRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;
  activeRoomId = roomId;
  activePassword = room.password;

  if (!sharedKey) {
    deriveKey(room.password).then(() => setupChatUI(room));
  } else {
    setupChatUI(room);
  }
}

function setupChatUI(room) {
  document.getElementById('currentRoomName').textContent = room.name;
  const container = document.getElementById('messagesContainer');
  container.innerHTML = '';
  loadMessages(room.id).forEach(msg => {
    appendMessageToContainer(msg.text, msg.sender === myPeerId ? 'mine' : 'other');
  });

  updateMemberListUI();
  updateOnlineStatus();
  showChat();
}

// ==================== WebRTC ====================
async function createLocalOfferForRoom(roomId) {
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.services.mozilla.com:3478' }] });
  const dc = pc.createDataChannel('chat');
  peers['local'] = { pc, dc };
  setupDataChannel(dc, 'local');
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIce(pc);
  monitorPeerConnection(pc, 'local');
}

async function connectToPeer(offer, peerId) {
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.services.mozilla.com:3478' }] });
  peers[peerId] = { pc, dc: null };
  pc.ondatachannel = (e) => setupDataChannel(e.channel, peerId);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitForIce(pc);
  monitorPeerConnection(pc, peerId);
}

function setupDataChannel(dc, peerId) {
  dc.onopen = () => {
    if (peerId !== 'local' && !connectedPeers.includes(peerId)) {
      connectedPeers.push(peerId);
      updateMemberListUI();
      const room = rooms.find(r => r.id === activeRoomId);
      if (room && !room.members.includes(peerId)) {
        room.members.push(peerId);
        saveRooms();
      }
    }
    updateOnlineStatus();
  };
  dc.onmessage = (e) => handleMessage(e.data, peerId);
  dc.onclose = () => {
    if (peerId !== 'local') {
      connectedPeers = connectedPeers.filter(id => id !== peerId);
      updateMemberListUI();
      updateOnlineStatus();
    }
  };
  if (peers[peerId]) peers[peerId].dc = dc;
}

function monitorPeerConnection(pc, peerId) {
  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      if (peerId !== 'local') {
        connectedPeers = connectedPeers.filter(id => id !== peerId);
        updateMemberListUI();
        updateOnlineStatus();
      }
    }
  };
}

// ==================== 메시지 송수신 ====================
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !sharedKey) return;

  const encrypted = await encrypt(text);
  Object.values(peers).forEach(({ dc }) => {
    if (dc && dc.readyState === 'open') {
      dc.send(JSON.stringify({ type: 'msg', ...encrypted }));
    }
  });

  appendMessageToContainer(text, 'mine');
  saveLocalMessage(text, myPeerId);
  input.value = '';
}

function handleMessage(data, peerId) {
  try {
    const obj = JSON.parse(data);
    if (obj.type === 'msg') {
      decrypt(obj).then(plain => {
        appendMessageToContainer(plain, 'other');
        saveLocalMessage(plain, peerId);
      }).catch(err => {
        console.error('복호화 실패:', err);
        appendMessageToContainer('⚠️ 복호화 실패', 'system');
      });
    }
  } catch (e) {}
}

function saveLocalMessage(text, senderId) {
  if (!activeRoomId) return;
  const msgs = loadMessages(activeRoomId);
  msgs.push({ text, sender: senderId, time: Date.now() });
  saveMessages(activeRoomId, msgs);
}

function appendMessageToContainer(text, type) {
  const container = document.getElementById('messagesContainer');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ==================== 암호화 ====================
async function deriveKey(password) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  sharedKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('p2p-salt-constant'), iterations: 200000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}
async function encrypt(plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, new TextEncoder().encode(plaintext));
  return { iv: Array.from(iv), ct: Array.from(new Uint8Array(ct)) };
}
async function decrypt(data) {
  const iv = new Uint8Array(data.iv);
  const ct = new Uint8Array(data.ct);
  const buf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
  return new TextDecoder().decode(buf);
}

// ==================== 초대 / 나가기 ====================
async function inviteToCurrentRoom() {
  if (!activeRoomId) return;
  if (!peers['local']) await createLocalOfferForRoom(activeRoomId);
  const room = rooms.find(r => r.id === activeRoomId);
  const offer = peers['local'].pc.localDescription;
  const link = `${location.origin}${location.pathname}#join=${activeRoomId}&offer=${btoa(JSON.stringify(offer))}&pw=${encodeURIComponent(room.password)}`;
  prompt('초대 링크를 복사하세요:', link);
}

function leaveCurrentRoom() {
  closeAllPeers();
  activeRoomId = null;
  sharedKey = null;
  showRoomList();
}

function closeAllPeers() {
  Object.values(peers).forEach(({ pc }) => pc.close());
  peers = {};
  connectedPeers = [];
}

// ==================== UI 갱신 ====================
function updateMemberListUI() {
  const list = document.getElementById('memberList');
  const room = rooms.find(r => r.id === activeRoomId);
  const members = room ? room.members : [];
  list.innerHTML = members.map(id => {
    const isMe = id === myPeerId;
    const isOnline = id === 'local' || connectedPeers.includes(id);
    return `<span class="member-tag" style="opacity:${isOnline ? 1 : 0.5}">${isMe ? '나' : id.slice(0,6)} ${isOnline ? '●' : '○'}</span>`;
  }).join('');
}

function updateOnlineStatus() {
  const dot = document.getElementById('globalStatusDot');
  const label = document.getElementById('globalStatusLabel');
  const online = connectedPeers.length > 0;
  dot.className = 'status-dot ' + (online ? 'on' : 'off');
  label.textContent = online ? `${connectedPeers.length}명 연결됨` : '오프라인';
  const badge = document.getElementById('onlineBadge');
  if (badge) badge.textContent = online ? `(${connectedPeers.length}명 접속)` : '(오프라인)';
}

// ==================== 백업/복원 ====================
function exportAllData() {
  const backup = rooms.map(room => ({
    ...room,
    messages: loadMessages(room.id)
  }));
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `p2p-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

async function importAllData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error();
    if (confirm('기존 데이터를 덮어쓰시겠습니까? (취소: 병합)')) rooms = [];
    data.forEach(room => {
      const existing = rooms.find(r => r.id === room.id);
      if (existing) {
        Object.assign(existing, room);
        if (room.messages) saveMessages(room.id, room.messages);
      } else {
        rooms.push(room);
        if (room.messages) saveMessages(room.id, room.messages);
      }
    });
    saveRooms();
    renderRoomList();
    alert('복원 완료!');
  } catch (e) { alert('올바른 백업 파일이 아닙니다.'); }
  event.target.value = '';
}

// ==================== 유틸 ====================
function waitForIce(pc) {
  return new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') resolve();
    else pc.addEventListener('icegatheringstatechange', () => {
      if (pc.iceGatheringState === 'complete') resolve();
    });
  });
}
function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);
}
