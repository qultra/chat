<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>P2P 메신저 – 암호화 핸드셰이크 수정판</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 0%, #1a1f35, #0b0e14);
      color: #e0e0e0; display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 20px;
    }
    .container {
      width: 100%; max-width: 800px; height: 90vh;
      background: rgba(20, 25, 40, 0.8); backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px); border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .header {
      padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h2 {
      font-size: 1.5rem; font-weight: 600;
      background: linear-gradient(135deg, #a0c0ff, #6d8ae7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .status-badge { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 500; color: #aaa; }
    .led { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    .led.on { background: #4caf50; color: #4caf50; }
    .led.off { background: #f44336; color: #f44336; }
    .main-area { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
    .card {
      background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px; padding: 20px; margin-bottom: 16px;
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    button {
      background: rgba(255,255,255,0.06); color: white; border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 18px; border-radius: 14px; cursor: pointer; font-weight: 500;
      font-size: 0.95rem; transition: all 0.2s; backdrop-filter: blur(10px);
      display: inline-flex; align-items: center; gap: 6px;
    }
    button:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
    button.primary { background: #3a5a9f; border-color: #6a8fd8; box-shadow: 0 4px 12px rgba(58,90,159,0.4); }
    button.primary:hover { background: #4b6db5; }
    button.big { padding: 18px 28px; font-size: 1.3rem; border-radius: 20px; width: 100%; justify-content: center; }
    textarea, input[type=text] {
      background: rgba(0,0,0,0.3); color: #ddd; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 12px 16px; font-family: inherit; font-size: 0.9rem; width: 100%; resize: vertical;
    }
    .chat-screen { display: none; flex-direction: column; flex: 1; }
    .messages-container {
      flex: 1; overflow-y: auto; padding: 8px 4px 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .message { display: flex; max-width: 80%; }
    .message.mine { align-self: flex-end; }
    .message.other { align-self: flex-start; }
    .bubble {
      padding: 10px 16px; border-radius: 18px; word-break: break-word; position: relative;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
    }
    .message.mine .bubble { background: linear-gradient(135deg, #2f4b7c, #1e3a5f); border-bottom-right-radius: 4px; }
    .message.other .bubble { background: rgba(255,255,255,0.06); border-bottom-left-radius: 4px; }
    .timestamp { font-size: 0.65rem; color: #aaa; margin-top: 4px; text-align: right; }
    .file-msg { display: flex; align-items: center; gap: 8px; }
    .file-msg img { max-width: 200px; max-height: 150px; border-radius: 12px; cursor: pointer; }
    .input-bar { display: flex; gap: 8px; padding-top: 12px; }
    .attach-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 8px; color: #a0c0ff; }
    .hidden-file-input { display: none; }
    .small-text { font-size: 0.8rem; color: #aaa; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #a0c0ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fingerprint {
      font-family: monospace; background: rgba(0,0,0,0.3); padding: 6px 10px;
      border-radius: 8px; font-size: 0.75rem; word-break: break-all;
    }
    .copy-area { display: flex; gap: 8px; margin: 12px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>✦ P2P 메신저</h2>
    <div class="status-badge">
      <span id="connLed" class="led off"></span>
      <span id="connText">오프라인</span>
    </div>
  </div>
  <div class="main-area" id="mainArea">
    <div id="welcomeArea">
      <div class="card" style="text-align:center;">
        <h3 style="font-size:2rem; margin-bottom:8px;">👋 환영합니다</h3>
        <p style="color:#aaa; margin-bottom:24px;">서버도, 회원가입도 없이<br>가장 안전한 대화를 시작하세요.</p>
        <div style="display:flex; flex-direction:column; gap:16px;">
          <button class="primary big" onclick="startHost()">✨ 새 대화방 만들기</button>
          <button class="big" onclick="startJoinManually()">📩 초대 받고 참가하기</button>
        </div>
        <div class="row" style="justify-content:center; margin-top:16px;">
          <span id="idFpShort" class="fingerprint small-text">내 신원: 로딩 중...</span>
          <button onclick="exportId()" style="font-size:0.8rem;">📥</button>
          <button onclick="document.getElementById('importFile').click()" style="font-size:0.8rem;">📤</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importId(event)">
      </div>
    </div>
    <div id="hostArea" style="display:none;">
      <div class="card" style="text-align:center;">
        <h3>🔗 대화방 링크</h3>
        <p style="color:#aaa; margin-bottom:12px;">아래 링크를 상대방에게 보내세요.</p>
        <div class="copy-area">
          <input type="text" id="shareLink" readonly placeholder="연결 링크 생성 중..." style="flex:1;">
          <button onclick="copyShareLink()">📋 복사</button>
        </div>
        <p style="color:#aaa; margin-top:8px;">상대방이 링크를 열면 Answer가 생성됩니다.<br>그걸 받아서 아래 붙여넣으세요.</p>
        <div class="card" style="margin-top:12px;">
          <h4>📥 상대방의 Answer</h4>
          <textarea id="remoteAnswerSDP" rows="4" placeholder="여기에 Answer를 붙여넣으세요..."></textarea>
          <button onclick="applyAnswer()" class="primary" style="margin-top:8px;">✅ 연결 완료</button>
        </div>
        <div class="spinner" id="hostSpinner" style="display:none;"></div>
      </div>
    </div>
    <div id="joinArea" style="display:none;">
      <div class="card" style="text-align:center;">
        <h3>📥 대화 참가</h3>
        <p style="color:#aaa; margin-bottom:12px;" id="joinInfo">받은 링크를 열면 자동으로 Answer가 생성됩니다.</p>
        <div id="joinManualSection">
          <textarea id="remoteOfferSDP" rows="4" placeholder="받은 Offer SDP를 여기에 붙여넣으세요..."></textarea>
          <button onclick="createAnswerFromOffer()" class="primary" style="margin-top:8px;">연결하기</button>
        </div>
        <div id="joinAnswerSection" style="display:none;">
          <p style="color:#4caf50;">✅ Answer가 생성되었습니다!</p>
          <textarea id="localAnswerDisplay" readonly rows="4" style="margin-top:8px;"></textarea>
          <div class="copy-area" style="margin-top:8px;">
            <button onclick="copyAnswer()" class="primary">📋 Answer 복사하기</button>
          </div>
          <p style="color:#aaa; margin-top:8px;">이 Answer를 <strong>방장에게 보내주세요.</strong></p>
        </div>
        <div class="spinner" id="joinSpinner" style="display:none;"></div>
      </div>
    </div>
    <div id="chatScreen" class="chat-screen">
      <div id="messagesContainer" class="messages-container"></div>
      <div class="input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="messageInput" placeholder="메시지 입력 (E2EE 암호화)" autocomplete="off" style="flex:1;">
        <button onclick="sendTextMessage()" class="primary">전송</button>
      </div>
      <input type="file" id="fileInput" class="hidden-file-input" multiple onchange="handleFileSelect(event)">
    </div>
  </div>
</div>
<script>
// ---------------- 전역 변수 ----------------
const ID_STORAGE_KEY = 'p2p_identity_fixed';
const CHUNK_SIZE = 16 * 1024;
let idKeyPair, idPubJwkStr;
let ephemeralKeyPair, peerEphemeralPubKey;
let rootKey, sendingChainKey, receivingChainKey;
let sendingIdx = 0, receivingIdx = 0;
let pc, dc;
let isOfferer = false;
let pendingFileBuffers = {};
let handshakeDone = false;
let isChatScreenActive = false;

// ---------------- 서버 목록 (150+) ----------------
const GLOBAL_SERVERS = [
  'stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302','stun:stun2.l.google.com:19302','stun:stun3.l.google.com:19302','stun:stun4.l.google.com:19302',
  'stun:global.stun.twilio.com:3478','stun:stun.twilio.com:3478',
  'stun:stun.services.mozilla.com:3478','stun:stun.nextcloud.com:443','stun:stun.linphone.org:3478',
  'stun:stun.freeswitch.org:3478','stun:stun.ekiga.net:3478','stun:stun.viagenie.ca:3478','stun:stun.stunprotocol.org:3478',
  'stun:stun.sipgate.net:3478','stun:stun.sipgate.de:3478','stun:stun.sipgate.co.uk:3478','stun:stun.sipgate.com:3478',
  'stun:stun.iptel.org:3478','stun:stun.iptel.net:3478','stun:stun.iptel.com:3478','stun:stun.iptel.io:3478','stun:stun.iptel.ch:3478',
  'stun:openrelay.metered.ca:80','stun:openrelay.metered.ca:443',
  'turn:openrelay.metered.ca:80?transport=tcp','turn:openrelay.metered.ca:80?transport=udp','turn:openrelay.metered.ca:443?transport=tcp','turn:openrelay.metered.ca:443?transport=udp','turn:openrelay.metered.ca:5349?transport=tcp','turn:openrelay.metered.ca:5349?transport=udp',
  'stun:stun.numb.co:3478','stun:stun.counterpath.com:3478',
  'stun:stun.voipbuster.com:3478','stun:stun.voipstunt.com:3478','stun:stun.voipswitch.com:3478','stun:stun.voiparound.com:3478','stun:stun.voipcheap.com:3478','stun:stun.voipdiscount.com:3478','stun:stun.sipdiscount.com:3478','stun:stun.voipgain.com:3478','stun:stun.myvoipprovider.com:3478',
  'stun:stun.schlund.de:3478','stun:stun.voipgate.com:3478','stun:stun.callwithus.com:3478','stun:stun.netapp.com:3478','stun:stun.blink.de:3478',
  'stun:stun.ovh.net:3478','stun:stun.12voip.com:3478','stun:stun.evaphone.com:3478','stun:stun.intervoip.com:3478','stun:stun.freevoipdeal.com:3478',
  'stun:stun.voxox.com:3478','stun:stun.pbxes.com:3478','stun:stun.pbxes.de:3478','stun:stun.gradwell.com:3478','stun:stun.ideasip.com:3478',
  'stun:stun.phonepower.com:3478','stun:stun.skyways.com:3478','stun:stun.3cx.com:3478','stun:stun.t-online.de:3478',
  'stun:stun.sippeer.com:3478','stun:stun.azteca.net:3478','stun:stun.zoiper.com:3478','stun:stun.onsip.com:3478','stun:stun.sipgate.team:3478',
  'stun:stun.voip.ms:3478','stun:stun.telnyx.com:3478','stun:stun.flowroute.com:3478','stun:stun.bandwidth.com:3478','stun:stun.vonage.com:3478',
  'stun:stun.cisco.com:3478','stun:stun.oracle.com:3478','stun:stun.microsoft.com:3478','stun:stun.cloudflare.com:3478',
  'stun:stun.voipraider.com:3478','stun:stun.justvoip.com:3478','stun:stun.internetcalls.com:3478','stun:stun.nonoh.net:3478',
  'stun:stun.poivy.com:3478','stun:stun.telbo.com:3478','stun:stun.voipwise.com:3478','stun:stun.webcalldirect.com:3478'
];

// Base64URL 헬퍼
function toBase64url(str) { return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function fromBase64url(b64) {
  b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length%4) b64+='='; return atob(b64);
}

// 초기화
(async function init(){
  await loadOrCreateIdentity();
  handleURLHash();
  document.getElementById('messageInput').addEventListener('keypress', e => { if(e.key==='Enter') sendTextMessage(); });
})();

async function loadOrCreateIdentity(){
  const stored = localStorage.getItem(ID_STORAGE_KEY);
  if(stored){
    const jwk = JSON.parse(stored);
    idKeyPair = await crypto.subtle.importKey('jwk',jwk,{name:'ECDH',namedCurve:'P-521'},false,['deriveBits']);
  }else{
    idKeyPair = await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-521'},true,['deriveBits']);
    const priJwk = await crypto.subtle.exportKey('jwk',idKeyPair.privateKey);
    localStorage.setItem(ID_STORAGE_KEY,JSON.stringify(priJwk));
  }
  const pubJwk = await crypto.subtle.exportKey('jwk',idKeyPair.publicKey);
  idPubJwkStr = pubJwk.x ? pubJwk.x.substring(0,8)+'...' : 'P-521';
  document.getElementById('idFpShort').textContent = '내 신원: '+idPubJwkStr;
}

async function exportId(){
  const priJwk = await crypto.subtle.exportKey('jwk',idKeyPair.privateKey);
  const blob = new Blob([JSON.stringify(priJwk)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'p2pchat-id.json'; a.click();
}
async function importId(event){
  const file = event.target.files[0]; const text = await file.text(); const jwk = JSON.parse(text);
  idKeyPair = await crypto.subtle.importKey('jwk',jwk,{name:'ECDH',namedCurve:'P-521'},false,['deriveBits']);
  localStorage.setItem(ID_STORAGE_KEY,JSON.stringify(jwk));
  const pubJwk = await crypto.subtle.exportKey('jwk',idKeyPair.publicKey);
  idPubJwkStr = pubJwk.x ? pubJwk.x.substring(0,8)+'...' : 'P-521';
  document.getElementById('idFpShort').textContent = '내 신원: '+idPubJwkStr;
}

function handleURLHash(){
  const hash = window.location.hash;
  if(hash && hash.startsWith('#join=')){
    const b64 = hash.replace('#join=','');
    try{
      const offerJson = fromBase64url(b64);
      showArea('joinArea');
      document.getElementById('remoteOfferSDP').value = offerJson;
      document.getElementById('joinManualSection').style.display='none';
      document.getElementById('joinInfo').textContent='링크에서 Offer를 읽었습니다. Answer를 생성합니다...';
      createAnswerFromOffer();
    }catch(e){
      alert('링크가 올바르지 않습니다. 수동으로 Offer SDP를 입력해주세요.');
      startJoinManually();
    }
  }
}

function showArea(areaId){
  ['welcomeArea','hostArea','joinArea'].forEach(id => document.getElementById(id).style.display='none');
  if(areaId) document.getElementById(areaId).style.display='block';
}
function startHost(){
  showArea('hostArea');
  document.getElementById('hostSpinner').style.display='block';
  createOfferAsHost();
}
function startJoinManually(){
  showArea('joinArea');
  document.getElementById('joinManualSection').style.display='block';
  document.getElementById('joinAnswerSection').style.display='none';
  document.getElementById('joinInfo').textContent='받은 Offer SDP를 붙여넣으세요.';
}

function generateShareLink(offerSDP){
  const b64 = toBase64url(offerSDP);
  const link = `${window.location.origin}${window.location.pathname}#join=${b64}`;
  document.getElementById('shareLink').value = link;
}
function copyShareLink(){
  const input = document.getElementById('shareLink'); input.select();
  navigator.clipboard.writeText(input.value);
  alert('링크가 복사되었습니다! 상대방에게 공유하세요.');
}

// WebRTC
function getIceServers(){
  const shuffled = [...GLOBAL_SERVERS].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,5).map(url => {
    if(url.startsWith('turn:')){
      const [addr,params] = url.split('?');
      const transport = params?.includes('transport=tcp') ? 'tcp' : 'udp';
      return { urls:`${addr}?transport=${transport}`, username:'openrelayproject', credential:'openrelayproject' };
    }
    return { urls: url };
  });
}
function initPeerConnection(){
  pc = new RTCPeerConnection({ iceServers: getIceServers() });
  pc.oniceconnectionstatechange = () => {
    const state = pc.iceConnectionState;
    updateConnectionStatus(state);
    if (isChatScreenActive && (state === 'disconnected' || state === 'failed')) {
      alert('연결이 끊어졌습니다.');
      showWelcomeScreen();
    }
  };
  pc.ondatachannel = (event) => {
    dc = event.channel;
    setupDataChannel();
    // ★ 이미 데이터 채널이 열려 있으면 바로 핸드셰이크 시작
    if (dc.readyState === 'open') {
      startE2EEIfNeeded();
    }
  };
}
function setupDataChannel(){
  dc.onopen = () => {
    updateConnectionStatus('connected');
    startE2EEIfNeeded();
  };
  dc.onmessage = handleIncomingMessage;
}

// ★ 데이터 채널이 열렸을 때 E2EE 시작 (중복 방지)
function startE2EEIfNeeded() {
  if (!handshakeDone && dc && dc.readyState === 'open') {
    performE2EEHandshake();
  }
}

async function createOfferAsHost(){
  isOfferer = true;
  initPeerConnection();
  dc = pc.createDataChannel('chat',{ordered:true});
  setupDataChannel();
  // 이미 open 상태일 수 있으므로 확인
  if (dc.readyState === 'open') {
    startE2EEIfNeeded();
  }
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIceComplete(pc);
  const sdpString = JSON.stringify(pc.localDescription);
  generateShareLink(sdpString);
  document.getElementById('hostSpinner').style.display='none';
}

async function createAnswerFromOffer(){
  const offerStr = document.getElementById('remoteOfferSDP').value.trim();
  if(!offerStr) return;
  isOfferer = false;
  initPeerConnection();
  try{
    const offer = JSON.parse(offerStr);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await waitForIceComplete(pc);
    const answerSDP = JSON.stringify(pc.localDescription);
    document.getElementById('localAnswerDisplay').value = answerSDP;
    document.getElementById('joinAnswerSection').style.display='block';
    document.getElementById('joinManualSection').style.display='none';
    document.getElementById('joinSpinner').style.display='none';
    document.getElementById('joinInfo').textContent='Answer가 생성되었습니다. 복사해서 방장에게 보내세요.';
  }catch(e){ alert('연결 생성 실패: '+e.message); }
}

function copyAnswer(){
  const ta = document.getElementById('localAnswerDisplay'); ta.select();
  navigator.clipboard.writeText(ta.value);
  alert('Answer가 클립보드에 복사되었습니다. 방장에게 전달하세요.');
}

async function applyAnswer(){
  const answerStr = document.getElementById('remoteAnswerSDP').value.trim();
  if(!answerStr) return;
  const answer = JSON.parse(answerStr);
  await pc.setRemoteDescription(answer);
}

function waitForIceComplete(connection){
  return new Promise(resolve => {
    if(connection.iceGatheringState==='complete') resolve();
    else connection.addEventListener('icegatheringstatechange',()=>{
      if(connection.iceGatheringState==='complete') resolve();
    });
  });
}

// E2EE + Ratchet
async function performE2EEHandshake(){
  ephemeralKeyPair = await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-521'},true,['deriveBits']);
  dc.send(JSON.stringify({type:'handshake',ephemeralPubKey: await crypto.subtle.exportKey('jwk',ephemeralKeyPair.publicKey)}));
}

async function handleIncomingMessage(event){
  try{
    if(event.data instanceof ArrayBuffer){ handleBinaryChunk(event.data); return; }
    const data = JSON.parse(event.data);
    if(data.type==='handshake') await processHandshake(data);
    else if(data.type==='text') addMessage(await decryptWithRatchet(data,false),'other');
    else if(data.type==='file-header') await handleFileHeader(data);
  }catch(e){ console.error('msg err',e); }
}

async function processHandshake(data){
  if(!data.ephemeralPubKey) return;
  peerEphemeralPubKey = await crypto.subtle.importKey('jwk',data.ephemeralPubKey,{name:'ECDH',namedCurve:'P-521'},false,[]);
  const sharedBits = await crypto.subtle.deriveBits({name:'ECDH',public:peerEphemeralPubKey},ephemeralKeyPair.privateKey,256);
  rootKey = await crypto.subtle.importKey('raw',sharedBits,{name:'HKDF'},false,['deriveKey','deriveBits']);
  sendingChainKey = await deriveChainKey(rootKey,'send');
  receivingChainKey = await deriveChainKey(rootKey,'recv');
  sendingIdx = 0; receivingIdx = 0;
  if(!isOfferer) await performE2EEHandshake(); // answerer 응답
  if(!handshakeDone){
    handshakeDone = true;
    showChatScreen();
  }
}

async function deriveChainKey(parentKey,info){
  return crypto.subtle.deriveKey(
    {name:'HKDF',hash:'SHA-512',salt:new Uint8Array(0),info:new TextEncoder().encode(`p2p-chain-${info}`)},
    parentKey,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}
async function ratchetEncrypt(plaintext){
  const mk = await deriveMessageKey(sendingChainKey,sendingIdx);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv},mk,new TextEncoder().encode(plaintext));
  sendingChainKey = await advanceChainKey(sendingChainKey);
  sendingIdx++;
  return {iv:Array.from(iv),ct:Array.from(new Uint8Array(ct)),index:sendingIdx-1};
}
async function ratchetDecrypt(data,forFile=false){
  let idx = data.index;
  while(receivingIdx < idx){ receivingChainKey = await advanceChainKey(receivingChainKey); receivingIdx++; }
  const mk = await deriveMessageKey(receivingChainKey,idx);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(data.iv)},mk,new Uint8Array(data.ct));
  receivingChainKey = await advanceChainKey(receivingChainKey);
  receivingIdx++;
  return forFile ? plain : new TextDecoder().decode(plain);
}
async function deriveMessageKey(chainKey,index){
  const info = new TextEncoder().encode(`msg-${index}`);
  const bits = await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(0),info},chainKey,256);
  return crypto.subtle.importKey('raw',bits,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function advanceChainKey(chainKey){
  const info = new TextEncoder().encode('chain-advance');
  const bits = await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(0),info},chainKey,256);
  return crypto.subtle.importKey('raw',bits,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function decryptWithRatchet(data,forFile){ return ratchetDecrypt(data,forFile); }

// UI 표시
function showWelcomeScreen(){
  isChatScreenActive = false;
  document.getElementById('chatScreen').style.display='none';
  showArea('welcomeArea');
  updateConnectionStatus('disconnected');
}
function showChatScreen(){
  isChatScreenActive = true;
  showArea(null);
  document.getElementById('welcomeArea').style.display='none';
  document.getElementById('chatScreen').style.display='flex';
  updateConnectionStatus('connected');
}
function updateConnectionStatus(state){
  const led=document.getElementById('connLed'), text=document.getElementById('connText');
  if(state==='connected'){ led.className='led on'; text.textContent='연결됨 (E2EE)'; }
  else if(state==='new'||state==='checking'){ led.className='led off'; text.textContent='연결 중...'; }
  else { led.className='led off'; text.textContent='오프라인'; }
}
function addMessage(content,sender){
  const container = document.getElementById('messagesContainer');
  const div = document.createElement('div');
  div.className = `message ${sender==='me'?'mine':'other'}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(content)}<div class="timestamp">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function addFileMessage(fileName,url,sender,isImage){
  const container = document.getElementById('messagesContainer');
  const div = document.createElement('div');
  div.className = `message ${sender==='me'?'mine':'other'}`;
  const inner = isImage 
    ? `<div class="file-msg"><img src="${url}" alt="${fileName}" onclick="window.open('${url}')"><span>${escapeHtml(fileName)}</span></div>`
    : `<div class="file-msg">📎 ${escapeHtml(fileName)} <a href="${url}" download="${fileName}" style="color:#a0c0ff;">다운로드</a></div>`;
  div.innerHTML = `<div class="bubble">${inner}<div class="timestamp">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// 텍스트 전송
async function sendTextMessage(){
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if(!text || !dc || dc.readyState!=='open' || !sendingChainKey) return;
  try{
    const encrypted = await ratchetEncrypt(text);
    dc.send(JSON.stringify({type:'text',...encrypted}));
    addMessage(text,'me');
    input.value = '';
  }catch(e){ alert('메시지 전송 오류: '+e.message); }
}

// 파일 전송 (간략)
async function handleFileSelect(event){ for(const file of event.target.files) await sendFile(file); event.target.value=''; }
async function sendFile(file){
  if(!dc||dc.readyState!=='open'||!sendingChainKey) return;
  const fileId = crypto.randomUUID();
  const totalChunks = Math.ceil(file.size/CHUNK_SIZE);
  const header = JSON.stringify({type:'file-header',fileId,fileName:file.name,fileSize:file.size,mimeType:file.type,totalChunks});
  dc.send(JSON.stringify({type:'file-header',...(await ratchetEncrypt(header))}));
  for(let i=0;i<totalChunks;i++){
    const start = i*CHUNK_SIZE, end = Math.min(start+CHUNK_SIZE,file.size);
    const buffer = await file.slice(start,end).arrayBuffer();
    const enc = await ratchetEncryptBinary(buffer);
    const meta = JSON.stringify({fileId,chunkIndex:i});
    const metaBytes = new TextEncoder().encode(meta);
    const metaLen = new Uint8Array(new Uint32Array([metaBytes.length]).buffer);
    const packet = new Uint8Array(4+metaBytes.length+enc.iv.length+enc.ct.length);
    packet.set(metaLen,0); packet.set(metaBytes,4);
    packet.set(enc.iv,4+metaBytes.length); packet.set(enc.ct,4+metaBytes.length+enc.iv.length);
    dc.send(packet.buffer);
  }
}
async function ratchetEncryptBinary(buffer){
  const mk = await deriveMessageKey(sendingChainKey,sendingIdx);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv},mk,buffer);
  sendingChainKey = await advanceChainKey(sendingChainKey);
  sendingIdx++;
  return {iv,ct:new Uint8Array(ct),index:sendingIdx-1};
}
async function handleBinaryChunk(arrayBuffer){
  if(!receivingChainKey) return;
  const data = new Uint8Array(arrayBuffer);
  const metaLen = new DataView(data.buffer).getUint32(0,false);
  const meta = JSON.parse(new TextDecoder().decode(data.slice(4,4+metaLen)));
  const iv = data.slice(4+metaLen,4+metaLen+12);
  const ct = data.slice(4+metaLen+12);
  const plainBuffer = await ratchetDecryptBinary({iv:Array.from(iv),ct:Array.from(ct),index:receivingIdx});
  if(!pendingFileBuffers[meta.fileId]) pendingFileBuffers[meta.fileId] = {chunks:[],totalChunks:null,name:null,mime:null,receivedCount:0};
  const fb = pendingFileBuffers[meta.fileId];
  fb.chunks[meta.chunkIndex] = new Uint8Array(plainBuffer);
  fb.receivedCount++;
  if(fb.totalChunks && fb.receivedCount===fb.totalChunks) assembleFile(meta.fileId);
}
async function ratchetDecryptBinary(data){
  let idx = data.index;
  while(receivingIdx<idx){ receivingChainKey = await advanceChainKey(receivingChainKey); receivingIdx++; }
  const mk = await deriveMessageKey(receivingChainKey,idx);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(data.iv)},mk,new Uint8Array(data.ct));
  receivingChainKey = await advanceChainKey(receivingChainKey);
  receivingIdx++;
  return plain;
}
async function handleFileHeader(data){
  const plainText = await decryptWithRatchet(data,false);
  const {fileId,fileName,fileSize,mimeType,totalChunks} = JSON.parse(plainText);
  if(!pendingFileBuffers[fileId]) pendingFileBuffers[fileId] = {chunks:[],totalChunks,name:fileName,mime:mimeType,receivedCount:0};
  else{
    Object.assign(pendingFileBuffers[fileId],{totalChunks,name:fileName,mime:mimeType});
    if(pendingFileBuffers[fileId].receivedCount===totalChunks) assembleFile(fileId);
  }
}
function assembleFile(fileId){
  const fb = pendingFileBuffers[fileId];
  if(!fb||fb.receivedCount!==fb.totalChunks) return;
  const blob = new Blob(fb.chunks,{type:fb.mime||'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  addFileMessage(fb.name,url,'other',fb.mime?.startsWith('image/'));
  delete pendingFileBuffers[fileId];
}
function escapeHtml(text){ return String(text).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
