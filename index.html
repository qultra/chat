<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 메신저 - 완벽 작동</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card-bg: rgba(20,26,36,0.8);
      --text: #e2e8f0; --sub: #94a3b8; --accent: #5b8def;
      --danger: #f87171; --success: #4ade80; --border: #1e293b;
      --radius: 16px; --radius-sm: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 12px;
    }
    .app {
      width: 100%; max-width: 560px; height: 95dvh;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .header {
      padding: 14px 20px; background: rgba(15,23,33,0.9);
      backdrop-filter: blur(24px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: var(--success); }
    .dot.off { background: var(--danger); }

    .main { flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; }
    .main::-webkit-scrollbar { width:5px; } .main::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }

    .card {
      background: var(--card-bg); backdrop-filter: blur(16px);
      border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border);
      padding: 12px 18px; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s; width: 100%;
      text-align: center; backdrop-filter: blur(12px);
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.small { padding: 8px 14px; width:auto; }
    .btn-group { display: flex; gap: 8px; }
    .btn-group .btn { flex:1; }

    input, textarea {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: 0.95rem; outline: none;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    #chatScreen { display: none; flex-direction: column; flex:1; }
    #messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
      padding: 4px 0;
    }
    .msg { display: flex; }
    .msg.me { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 10px 16px; border-radius: 20px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.04);
      word-break: break-word;
    }
    .msg.me .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .time { font-size: 0.6rem; color: var(--sub); margin-top: 4px; text-align: right; }
    .input-bar { display: flex; gap: 8px; padding-top: 12px; }
    #msgInput { flex:1; }

    .hidden { display: none !important; }
    .text-sub { color: var(--sub); font-size: 0.8rem; }
    .mt { margin-top: 10px; }
    .mb { margin-bottom: 8px; }
    .link-box { word-break: break-all; background: #0f131c; padding: 10px; border-radius: 10px; font-size: 0.7rem; margin: 6px 0; }
    .spinner {
      width: 20px; height: 20px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✦ P2P 메신저</h1>
    <div class="status-dot">
      <span id="connDot" class="dot off"></span>
      <span id="connLabel">오프라인</span>
    </div>
  </div>

  <div class="main" id="mainView">
    <!-- 기본 화면 -->
    <div id="homeView" style="display:block;">
      <div class="card">
        <button class="btn primary" onclick="createNewRoom()">✨ 새 채팅</button>
        <p class="text-sub mt" style="text-align:center;">또는 초대 링크/답장 링크를 클릭하세요</p>
      </div>
      <!-- 수동 답장 입력 (링크 전체 붙여넣기) -->
      <div class="card">
        <strong>📥 답장 링크 붙여넣기</strong>
        <input type="text" id="manualAnswerLink" placeholder="상대에게 받은 답장 링크를 여기에 붙여넣으세요" class="mt">
        <button class="btn mt" onclick="applyManualAnswer()">✅ 연결하기</button>
      </div>
    </div>

    <!-- 방 생성 후 초대 링크 표시 -->
    <div id="inviteView" style="display:none;">
      <div class="card">
        <button class="btn small" onclick="showHome()">← 뒤로</button>
        <p class="text-sub mt">아래 링크를 상대에게 보내주세요</p>
        <div class="link-box" id="inviteLinkDisplay"></div>
        <div class="btn-group mt">
          <button class="btn" onclick="copyInviteLink()">📋 복사</button>
        </div>
        <p class="text-sub mt">상대방이 답장 링크를 보내면 이 브라우저에서 열어주세요.</p>
      </div>
    </div>

    <!-- 게스트: 답장 링크 생성 화면 -->
    <div id="answerView" style="display:none;">
      <div class="card" style="text-align:center;">
        <div class="spinner mb" id="answerSpinner"></div>
        <p id="answerStatusText">연결 준비 중...</p>
        <div id="answerLinkBox" style="display:none;" class="mt">
          <p class="text-sub">아래 링크를 <strong>방장에게</strong> 보내주세요</p>
          <div class="link-box" id="answerLinkDisplay"></div>
          <div class="btn-group mt">
            <button class="btn" onclick="copyAnswerLink()">📋 복사</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 연결 대기 화면 -->
    <div id="waitView" style="display:none; text-align:center; margin-top:30px;">
      <div class="spinner" style="width:24px;height:24px;margin:20px auto;"></div>
      <p>상대방과 연결 중...</p>
      <button class="btn mt small" onclick="cancelWait()">취소</button>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen">
      <div id="messages"></div>
      <div class="input-bar">
        <input type="text" id="msgInput" placeholder="메시지 입력..." autocomplete="off">
        <button class="btn primary" onclick="sendMessage()" style="width:auto; padding:10px 18px;">전송</button>
      </div>
    </div>
  </div>
</div>

  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

// ==================== 저장소 ====================
function saveOffer(roomId, offer) {
  localStorage.setItem(OFFER_STORE_KEY + roomId, JSON.stringify(offer));
}
function loadOffer(roomId) {
  const stored = localStorage.getItem(OFFER_STORE_KEY + roomId);
  return stored ? JSON.parse(stored) : null;
}

// ==================== 화면 전환 ====================
function showView(viewId) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('inviteView').style.display = 'none';
  document.getElementById('answerView').style.display = 'none';
  document.getElementById('waitView').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'none';
  if (viewId === 'chat') document.getElementById('chatScreen').style.display = 'flex';
  else if (viewId) document.getElementById(viewId).style.display = 'block';
}
function showHome() { showView('homeView'); }
function showChat() { showView('chat'); }

// ==================== 방 생성 (호스트) ====================
async function createNewRoom() {
  // 정리
  closeConnection();
  isOfferer = true;
  activeRoomId = crypto.randomUUID();

  try {
    peerConn = new RTCPeerConnection({ iceServers: ALL_ICE_SERVERS });
    const dc = peerConn.createDataChannel('chat');
    setupDataChannel(dc);
    const offer = await peerConn.createOffer();
    await peerConn.setLocalDescription(offer);
    // ICE 수집 기다리기 (최대 8초)
    try {
      await Promise.race([
        waitIce(peerConn),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
      ]);
    } catch (e) { console.log('ICE timeout, continue'); }

    // Offer 저장
    saveOffer(activeRoomId, peerConn.localDescription);
    // 초대 링크 생성
    const link = location.origin + location.pathname + '#join=' + activeRoomId + '&offer=' + toBase64URL(JSON.stringify(peerConn.localDescription));
    document.getElementById('inviteLinkDisplay').textContent = link;
    showView('inviteView');

    // 연결 감시
    monitorConnection();
  } catch (e) {
    console.error(e);
    alert('방 생성 실패: ' + e.message);
    showHome();
  }
}

function copyInviteLink() {
  navigator.clipboard.writeText(document.getElementById('inviteLinkDisplay').textContent).then(() => alert('복사 완료!'));
}

// ==================== 게스트: 자동 Answer 생성 ====================
async function handleHash() {
  const hash = window.location.hash.substring(1);
  if (!hash) return;
  const params = new URLSearchParams(hash);
  if (params.has('join') && params.has('offer')) {
    // 게스트 모드
    const offerBase64 = params.get('offer');
    const roomId = params.get('join');
    try {
      const offer = JSON.parse(fromBase64URL(offerBase64));
      // 화면 전환
      showView('answerView');
      document.getElementById('answerSpinner').style.display = 'inline-block';
      document.getElementById('answerLinkBox').style.display = 'none';
      document.getElementById('answerStatusText').textContent = '연결 준비 중...';

      closeConnection();
      isOfferer = false;
      activeRoomId = roomId;
      peerConn = new RTCPeerConnection({ iceServers: ALL_ICE_SERVERS });
      peerConn.ondatachannel = (e) => setupDataChannel(e.channel);
      await peerConn.setRemoteDescription(offer);
      const answer = await peerConn.createAnswer();
      await peerConn.setLocalDescription(answer);
      try {
        await Promise.race([
          waitIce(peerConn),
          new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
        ]);
      } catch (e) {}

      // Answer 링크 생성
      const answerLink = location.origin + location.pathname + '#ans=' + roomId + '&answer=' + toBase64URL(JSON.stringify(peerConn.localDescription));
      document.getElementById('answerLinkDisplay').textContent = answerLink;
      document.getElementById('answerSpinner').style.display = 'none';
      document.getElementById('answerLinkBox').style.display = 'block';
      document.getElementById('answerStatusText').textContent = 'Answer 링크를 방장에게 보내주세요';

      monitorConnection();
    } catch (e) {
      console.error(e);
      alert('초대 링크가 잘못되었습니다.');
      showHome();
    }
  } else if (params.has('ans') && params.has('answer')) {
    // 호스트가 Answer 링크를 열었을 때
    const answerBase64 = params.get('answer');
    const roomId = params.get('ans');
    try {
      const answer = JSON.parse(fromBase64URL(answerBase64));
      // Offer 불러오기
      const storedOffer = loadOffer(roomId);
      if (!storedOffer) {
        alert('저장된 방 정보가 없습니다. 방을 먼저 만드세요.');
        showHome();
        return;
      }
      // 기존 연결 정리
      closeConnection();
      isOfferer = true;
      activeRoomId = roomId;
      peerConn = new RTCPeerConnection({ iceServers: ALL_ICE_SERVERS });
      const dc = peerConn.createDataChannel('chat');
      setupDataChannel(dc);
      await peerConn.setLocalDescription(storedOffer);
      await peerConn.setRemoteDescription(answer);
      showView('waitView');
      monitorConnection();
    } catch (e) {
      console.error(e);
      alert('답장 링크가 올바르지 않습니다.');
      showHome();
    }
  }
}
window.addEventListener('hashchange', handleHash);
window.addEventListener('load', () => {
  handleHash();
});

// ==================== 수동 답장 입력 ====================
function applyManualAnswer() {
  const link = document.getElementById('manualAnswerLink').value.trim();
  if (!link) return;
  // URL 파싱
  try {
    const url = new URL(link);
    const params = new URLSearchParams(url.hash.substring(1));
    if (params.has('ans') && params.has('answer')) {
      // 동일하게 처리
      const answerBase64 = params.get('answer');
      const roomId = params.get('ans');
      const answer = JSON.parse(fromBase64URL(answerBase64));
      const storedOffer = loadOffer(roomId);
      if (!storedOffer) {
        alert('저장된 방 정보가 없습니다. 먼저 방을 만드세요.');
        return;
      }
      closeConnection();
      isOfferer = true;
      activeRoomId = roomId;
      peerConn = new RTCPeerConnection({ iceServers: ALL_ICE_SERVERS });
      const dc = peerConn.createDataChannel('chat');
      setupDataChannel(dc);
      peerConn.setLocalDescription(storedOffer).then(() => {
        return peerConn.setRemoteDescription(answer);
      }).then(() => {
        showView('waitView');
        monitorConnection();
      }).catch(e => {
        console.error(e);
        alert('연결 실패');
      });
    } else {
      alert('유효한 답장 링크가 아닙니다.');
    }
  } catch (e) {
    alert('올바른 URL을 입력하세요.');
  }
}

function cancelWait() {
  showHome();
}

// ==================== WebRTC 이벤트 ====================
function setupDataChannel(dc) {
  dataChannel = dc;
  dc.onopen = () => {
    connectedPeers++;
    updateStatus(true);
    if (!sharedKey) startHandshake(dc);
    showChat();
    console.log('데이터 채널 열림');
  };
  dc.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'handshake') handleHandshake(data, dc);
    else if (data.type === 'msg') decrypt(data).then(p => appendMessage(p, 'other')).catch(() => appendMessage('복호화 실패', 'system'));
  };
  dc.onclose = () => {
    connectedPeers--;
    updateStatus(connectedPeers > 0);
  };
}

function monitorConnection() {
  peerConn.oniceconnectionstatechange = () => {
    console.log('ICE 상태:', peerConn.iceConnectionState);
    if (peerConn.iceConnectionState === 'connected') {
      if (document.getElementById('waitView').style.display !== 'none') {
        showChat();
      }
    } else if (peerConn.iceConnectionState === 'disconnected' || peerConn.iceConnectionState === 'failed') {
      updateStatus(false);
    }
  };
}

function updateStatus(connected) {
  const dot = document.getElementById('connDot'), label = document.getElementById('connLabel');
  dot.className = 'dot ' + (connected ? 'on' : 'off');
  label.textContent = connected ? '연결됨' : '오프라인';
}

// ==================== 암호화 (ECDH + AES-256-GCM) ====================
async function startHandshake(dc) {
  const eph = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveBits']);
  const pubJwk = await crypto.subtle.exportKey('jwk', eph.publicKey);
  // 임시 키 저장
  window._eph = { private: eph.privateKey };
  dc.send(JSON.stringify({ type: 'handshake', pub: pubJwk }));
}

async function handleHandshake(data, dc) {
  if (!data.pub) return;
  try {
    const remotePub = await crypto.subtle.importKey('jwk', data.pub, { name: 'ECDH', namedCurve: 'P-521' }, false, []);
    if (!window._eph) {
      // 게스트가 먼저 받은 경우
      const eph = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveBits']);
      window._eph = { private: eph.privateKey };
      dc.send(JSON.stringify({ type: 'handshake', pub: await crypto.subtle.exportKey('jwk', eph.publicKey) }));
    }
    const shared = await crypto.subtle.deriveBits(
      { name: 'ECDH', public: remotePub },
      window._eph.private,
      256
    );
    sharedKey = await crypto.subtle.importKey('raw', shared, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
    delete window._eph;
    // 검증
    const test = 'ok-' + Date.now();
    const enc = await encrypt(test);
    const dec = await decrypt(enc);
    if (dec === test) {
      appendMessage('✅ AES-256-GCM 암호화 연결 확인', 'system');
      console.log('암호화 검증 완료');
    } else {
      appendMessage('❌ 암호화 오류', 'system');
    }
  } catch (e) { console.error(e); }
}

async function encrypt(plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, new TextEncoder().encode(plaintext));
  return { iv: Array.from(iv), ct: Array.from(new Uint8Array(ct)) };
}

async function decrypt(data) {
  const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct);
  const buf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
  return new TextDecoder().decode(buf);
}

// ==================== 메시지 전송 ====================
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !sharedKey || !dataChannel || dataChannel.readyState !== 'open') return;
  const encrypted = await encrypt(text);
  dataChannel.send(JSON.stringify({ type: 'msg', ...encrypted }));
  appendMessage(text, 'me');
  input.value = '';
}

function appendMessage(text, sender) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (sender === 'me' ? 'me' : 'other');
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);
}

function waitIce(pc) {
  return new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') resolve();
    else pc.addEventListener('icegatheringstatechange', () => {
      if (pc.iceGatheringState === 'complete') resolve();
    });
  });
}

function closeConnection() {
  if (peerConn) { peerConn.close(); peerConn = null; }
  dataChannel = null;
  sharedKey = null;
  connectedPeers = 0;
  updateStatus(false);
}

function copyAnswerLink() {
  navigator.clipboard.writeText(document.getElementById('answerLinkDisplay').textContent).then(() => alert('복사 완료!'));
}

// 엔터 전송
document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
