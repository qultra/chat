<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 메신저 – 모든 기능 완전판</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card: rgba(20,26,36,0.85);
      --text: #e2e8f0; --sub: #94a3b8; --accent: #5b8def; --danger: #f87171;
      --border: #1e293b; --radius: 16px; --radius-sm: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
    }
    .container {
      width: 100%; max-width: 560px; height: 95dvh;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .header {
      padding: 14px 20px; background: rgba(15,23,33,0.9);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: #4ade80; } .dot.off { background: #f87171; }

    .main { flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; }
    .main::-webkit-scrollbar { width:4px; } .main::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    .card {
      background: var(--card); backdrop-filter: blur(12px);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.06); color: white; border: 1px solid var(--border);
      padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
      text-align: center; backdrop-filter: blur(10px);
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.small { padding: 6px 12px; font-size: 0.8rem; width: auto; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

    input, select, textarea {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 0.95rem; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }

    #chatScreen { display: none; flex-direction: column; flex:1; }
    #messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px;
      padding: 4px 0;
    }
    .msg { display: flex; margin-bottom: 2px; }
    .msg.me { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 8px 14px; border-radius: 18px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
      word-break: break-word;
    }
    .msg.me .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:4px; }
    .msg.other .bubble { border-bottom-left-radius:4px; }
    .time { font-size: 0.6rem; color: var(--sub); margin-top: 2px; text-align: right; }
    .file-inline img { max-width: 160px; max-height: 100px; border-radius: 10px; }
    .input-bar { display: flex; gap: 6px; padding: 10px 0 0; }
    #msgInput { flex:1; }
    .attach-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--accent); }

    .room-list { display: flex; flex-direction: column; gap: 6px; }
    .room-item {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.2s;
    }
    .room-item:hover { background: rgba(255,255,255,0.06); }
    .hidden { display: none !important; }
    .text-sub { color: var(--sub); font-size: 0.8rem; }
    .mt { margin-top: 8px; } .mb { margin-bottom: 8px; }
    .link-box { word-break: break-all; background: #0f131c; padding: 8px; border-radius: 10px; font-size: 0.7rem; margin: 6px 0; }
    .member-list { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0; }
    .member-tag { background: rgba(91,141,239,0.2); padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; }
    .badge { background: var(--accent); color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.7rem; margin-left: 6px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✦ P2P 메신저</h1>
    <div class="status-dot">
      <span id="connDot" class="dot off"></span>
      <span id="connLabel">오프라인</span>
    </div>
  </div>
  <div class="main" id="mainArea">
    <!-- 채팅방 목록 -->
    <div id="roomListPanel">
      <div class="card">
        <div class="btn-group">
          <button class="btn primary" onclick="showCreateRoom()">✨ 새 채팅방</button>
          <button class="btn" onclick="showJoinRoom()">📩 코드로 참가</button>
        </div>
        <div class="btn-group mt">
          <button class="btn small" onclick="exportAllData()">📥 백업</button>
          <button class="btn small" onclick="document.getElementById('restoreFile').click()">📤 복원</button>
        </div>
        <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="importAllData(event)">
      </div>
      <div id="savedRooms" class="room-list"></div>
    </div>

    <!-- 방 만들기 -->
    <div id="createRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 목록</button>
        <input type="text" id="roomName" placeholder="방 이름" class="mt">
        <select id="roomType" class="mt">
          <option value="direct">1:1 채팅</option>
          <option value="group">그룹 채팅</option>
          <option value="open">오픈 채널</option>
        </select>
        <input type="password" id="roomPassword" placeholder="방 암호 (꼭 기억하세요)" class="mt">
        <button class="btn primary mt" onclick="createRoom()">방 만들기</button>
      </div>
      <div id="createdRoomInfo" class="hidden card">
        <p><strong>초대 링크</strong></p>
        <div class="link-box" id="createdLink"></div>
        <button class="btn mt" onclick="copyLink('createdLink')">📋 복사</button>
      </div>
    </div>

    <!-- 방 참가 -->
    <div id="joinRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 목록</button>
        <input type="password" id="joinPassword" placeholder="방 암호" class="mt">
        <textarea id="joinOfferSDP" placeholder="또는 초대 코드 붙여넣기" class="mt" rows="2"></textarea>
        <button class="btn primary mt" onclick="joinRoom()">참가</button>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0;">
        <span id="currentRoomName" style="font-weight:600;"></span>
        <span id="onlineCount" class="text-sub"></span>
        <div>
          <button class="btn small" onclick="inviteToRoom()">➕ 초대</button>
          <button class="btn small" onclick="leaveRoom()">나가기</button>
        </div>
      </div>
      <div class="member-list" id="memberList"></div>
      <div id="messages"></div>
      <div class="input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="msgInput" placeholder="메시지 (종단간 암호화)" autocomplete="off">
        <button class="btn primary small" onclick="sendText()">전송</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
// ==================== 전역 상태 & 저장소 ====================
const ROOMS_KEY = 'p2p_rooms_final2';
const MSG_PREFIX = 'p2p_msgs_';

let rooms = JSON.parse(localStorage.getItem(ROOMS_KEY) || '[]');
let currentRoomId = null;
let currentPassword = '';
let sharedKey = null;
let myPeerId = 'peer-' + crypto.randomUUID().substring(0,8);

let peerConnections = {}; // peerId -> { pc, dc, channelName? }
let currentRoomPeers = []; // 현재 접속 중인 peerId

// ==================== 저장소 유틸 ====================
function saveRooms() {
  localStorage.setItem(ROOMS_KEY, JSON.stringify(rooms));
}
function loadMessages(roomId) {
  const data = localStorage.getItem(MSG_PREFIX + roomId);
  return data ? JSON.parse(data) : [];
}
function saveMessages(roomId, msgs) {
  const trimmed = msgs.slice(-500);
  localStorage.setItem(MSG_PREFIX + roomId, JSON.stringify(trimmed));
}
function addMessageToRoom(roomId, msg) {
  const msgs = loadMessages(roomId);
  msgs.push(msg);
  saveMessages(roomId, msgs);
}

// ==================== 암호화 ====================
async function deriveSharedKey(pw) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pw), { name: 'PBKDF2' }, false, ['deriveKey']);
  sharedKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('p2p-salt-v2'), iterations: 100000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encryptData(plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, new TextEncoder().encode(plaintext));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function encryptBuffer(buffer) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, buffer);
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptData(data) {
  const iv = new Uint8Array(data.iv);
  const ct = new Uint8Array(data.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
  return new TextDecoder().decode(plain);
}
async function decryptBuffer(data) {
  const iv = new Uint8Array(data.iv);
  const ct = new Uint8Array(data.ct);
  return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
}

// ==================== WebRTC 연결 관리 ====================
function createPeerConnection(peerId) {
  const pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.services.mozilla.com:3478' },
      { urls: 'stun:stun.l.google.com:19302' }
    ]
  });
  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      handlePeerDisconnected(peerId);
    }
  };
  pc.ondatachannel = (e) => {
    const dc = e.channel;
    setupDataChannel(dc, peerId);
    peerConnections[peerId].dc = dc; // 연결이 늦게 생성될 경우 업데이트
  };
  return pc;
}

function setupDataChannel(dc, peerId) {
  dc.onopen = () => {
    if (!currentRoomPeers.includes(peerId)) {
      currentRoomPeers.push(peerId);
      updateMemberList();
      const room = rooms.find(r => r.id === currentRoomId);
      if (room && !room.members.includes(peerId)) {
        room.members.push(peerId);
        saveRooms();
      }
    }
    // 요청: 상대방에게 접속자 목록 요청
    dc.send(JSON.stringify({ type: 'request-peer-list' }));
  };
  dc.onmessage = (e) => handleDataChannelMessage(e, peerId);
  dc.onclose = () => handlePeerDisconnected(peerId);
}

async function handlePeerDisconnected(peerId) {
  currentRoomPeers = currentRoomPeers.filter(id => id !== peerId);
  updateMemberList();
  if (peerConnections[peerId]) {
    try { peerConnections[peerId].pc.close(); } catch(e) {}
    delete peerConnections[peerId];
  }
  const room = rooms.find(r => r.id === currentRoomId);
  if (room) {
    room.members = room.members.filter(id => id !== peerId);
    saveRooms();
  }
}

// 전체 메시지 전송 (자신 제외)
function broadcastToAll(message, excludePeerId = null) {
  Object.entries(peerConnections).forEach(([pid, conn]) => {
    if (pid !== excludePeerId && conn.dc && conn.dc.readyState === 'open') {
      conn.dc.send(JSON.stringify(message));
    }
  });
}

// ==================== 메시지 핸들러 (데이터 채널) ====================
async function handleDataChannelMessage(event, fromPeerId) {
  try {
    if (event.data instanceof ArrayBuffer) {
      // 바이너리 청크 처리
      handleBinaryChunk(event.data, fromPeerId);
      return;
    }
    const data = JSON.parse(event.data);
    switch(data.type) {
      case 'chat': {
        if (!sharedKey) return;
        const plain = await decryptData(data);
        const display = `${fromPeerId.substring(0,6)}: ${plain}`;
        addMessageBubble(display, 'other');
        addMessageToRoom(currentRoomId, { text: display, sender: fromPeerId, time: Date.now() });
        break;
      }
      case 'file-header': {
        // 파일 헤더 수신: fileId, fileName, fileSize, mimeType, totalChunks
        const header = await decryptData(data);
        const meta = JSON.parse(header);
        pendingFiles[meta.fileId] = {
          fileName: meta.fileName,
          mimeType: meta.mimeType,
          size: meta.fileSize,
          totalChunks: meta.totalChunks,
          chunks: [],
          received: 0
        };
        break;
      }
      case 'file-chunk': {
        // 복호화하여 청크 저장
        const chunkData = await decryptData(data);
        const { fileId, index, iv: ivArr, ct: ctArr } = chunkData;
        if (!pendingFiles[fileId]) return;
        const fileInfo = pendingFiles[fileId];
        const plainBuffer = await decryptBuffer({ iv: ivArr, ct: ctArr });
        fileInfo.chunks[index] = new Uint8Array(plainBuffer);
        fileInfo.received++;
        if (fileInfo.received === fileInfo.totalChunks) {
          assembleFile(fileId);
        }
        break;
      }
      case 'request-peer-list': {
        // 상대에게 내가 알고 있는 피어 목록 전송
        if (peerConnections[fromPeerId]?.dc?.readyState === 'open') {
          peerConnections[fromPeerId].dc.send(JSON.stringify({
            type: 'peer-list',
            peers: currentRoomPeers.filter(id => id !== fromPeerId && id !== myPeerId)
          }));
        }
        break;
      }
      case 'peer-list': {
        // 받은 피어 목록에 대해 연결 시도
        const peers = data.peers || [];
        for (const pid of peers) {
          if (pid !== myPeerId && !peerConnections[pid]) {
            await connectToPeer(pid);
          }
        }
        break;
      }
      case 'signal': {
        // 시그널링 메시지 릴레이
        const { target, signal } = data;
        if (target === myPeerId) {
          // 나에게 온 신호
          handleSignal(signal, fromPeerId);
        } else {
          // 다른 피어에게 전달
          relaySignal(target, signal, fromPeerId);
        }
        break;
      }
      default: break;
    }
  } catch (e) {
    console.error('메시지 처리 오류:', e);
  }
}

// ==================== 시그널링 ====================
async function handleSignal(signal, fromPeerId) {
  const { type, sdp } = signal;
  if (type === 'offer') {
    const pc = createPeerConnection(fromPeerId);
    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    sendSignal(fromPeerId, { type: 'answer', sdp: pc.localDescription });
    // 데이터 채널은 ondatachannel에서 설정됨
    peerConnections[fromPeerId] = { pc, dc: null };
  } else if (type === 'answer') {
    const conn = peerConnections[fromPeerId];
    if (conn && conn.pc) {
      await conn.pc.setRemoteDescription(new RTCSessionDescription(sdp));
    }
  }
}

function sendSignal(targetPeerId, signal) {
  // 이미 해당 피어와 데이터 채널이 열려있다면 직접 전송, 아니면 아무 피어에게 릴레이 요청
  if (peerConnections[targetPeerId]?.dc?.readyState === 'open') {
    peerConnections[targetPeerId].dc.send(JSON.stringify({ type: 'signal', target: targetPeerId, signal }));
  } else {
    // 릴레이를 위해 첫 번째 연결된 피어를 사용
    const relayPeer = Object.keys(peerConnections).find(pid => peerConnections[pid]?.dc?.readyState === 'open');
    if (relayPeer) {
      peerConnections[relayPeer].dc.send(JSON.stringify({ type: 'signal', target: targetPeerId, signal }));
    } else {
      console.warn('릴레이할 피어가 없습니다.');
    }
  }
}

function relaySignal(targetPeerId, signal, fromPeerId) {
  if (targetPeerId === myPeerId) {
    handleSignal(signal, fromPeerId);
  } else {
    const conn = peerConnections[targetPeerId];
    if (conn?.dc?.readyState === 'open') {
      conn.dc.send(JSON.stringify({ type: 'signal', target: targetPeerId, signal }));
    } else {
      // 다른 피어에게 다시 릴레이 (간단히 모두에게 브로드캐스트)
      broadcastToAll({ type: 'signal', target: targetPeerId, signal }, fromPeerId);
    }
  }
}

// ==================== 피어 연결 초기화 ====================
async function connectToPeer(peerId) {
  if (peerId === myPeerId || peerConnections[peerId]) return;
  const pc = createPeerConnection(peerId);
  const dc = pc.createDataChannel('chat');
  setupDataChannel(dc, peerId);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  sendSignal(peerId, { type: 'offer', sdp: pc.localDescription });
  peerConnections[peerId] = { pc, dc };
}

// ==================== 파일 전송 ====================
let pendingFiles = {};
async function handleFiles(fileList) {
  for (const file of fileList) {
    await sendFile(file);
  }
}

async function sendFile(file) {
  const fileId = crypto.randomUUID();
  const totalChunks = Math.ceil(file.size / (16 * 1024));
  const header = {
    type: 'file-header',
    fileId,
    fileName: file.name,
    fileSize: file.size,
    mimeType: file.type,
    totalChunks
  };
  // 헤더 암호화 전송
  const encHeader = await encryptData(JSON.stringify(header));
  broadcastToAll({ type: 'file-header', ...encHeader });

  for (let i = 0; i < totalChunks; i++) {
    const start = i * 16 * 1024;
    const end = Math.min(start + 16 * 1024, file.size);
    const chunk = file.slice(start, end);
    const buffer = await chunk.arrayBuffer();
    const { iv, ct } = await encryptBuffer(buffer);
    const chunkMsg = {
      type: 'file-chunk',
      fileId,
      index: i,
      iv: iv,
      ct: ct
    };
    const encChunkMsg = await encryptData(JSON.stringify(chunkMsg));
    broadcastToAll({ type: 'file-chunk', ...encChunkMsg });
  }
  addMessageBubble(`📎 파일 전송 완료: ${file.name}`, 'me');
}

function assembleFile(fileId) {
  const info = pendingFiles[fileId];
  if (!info || info.received !== info.totalChunks) return;
  const blob = new Blob(info.chunks, { type: info.mimeType });
  const url = URL.createObjectURL(blob);
  const isImage = info.mimeType.startsWith('image/');
  if (isImage) {
    addMessageBubble(`<div class="file-inline"><img src="${url}" alt="${info.fileName}" onclick="window.open('${url}')"></div>`, 'other');
  } else {
    addMessageBubble(`📎 ${info.fileName} <a href="${url}" download="${info.fileName}" style="color:#7aa2f7;">저장</a>`, 'other');
  }
  delete pendingFiles[fileId];
}

async function handleBinaryChunk(arrayBuffer, fromPeerId) {
  // 바이너리 청크는 직접 복호화 후 조립 (파일 전송 시)
  // data는 이미 file-chunk 메시지 안에 포함된 iv/ct로 오지 않고, raw로 올 수 없으므로
  // 현재 구현에서는 모든 파일 청크가 JSON 내부에 base64? 여기서는 ArrayBuffer를 사용하지 않음
  // 실제로는 JSON으로 감싸서 보내므로, handleDataChannelMessage에서 처리됨
}

// ==================== 방 관리 ====================
function showRoomList() {
  hideAllPanels();
  document.getElementById('roomListPanel').classList.remove('hidden');
  renderRoomList();
}
function showCreateRoom() {
  hideAllPanels();
  document.getElementById('createRoomPanel').classList.remove('hidden');
  document.getElementById('createdRoomInfo').classList.add('hidden');
}
function showJoinRoom() {
  hideAllPanels();
  document.getElementById('joinRoomPanel').classList.remove('hidden');
}
function showChatScreen(roomId) {
  hideAllPanels();
  currentRoomId = roomId;
  document.getElementById('chatScreen').style.display = 'flex';
  const room = rooms.find(r => r.id === roomId);
  document.getElementById('currentRoomName').textContent = room?.name || '채팅';
  document.getElementById('messages').innerHTML = '';
  const msgs = loadMessages(roomId);
  msgs.forEach(m => {
    const who = m.sender === myPeerId ? 'me' : 'other';
    addMessageBubble(m.text, who);
  });
  updateMemberList();
}
function hideAllPanels() {
  document.getElementById('roomListPanel').classList.add('hidden');
  document.getElementById('createRoomPanel').classList.add('hidden');
  document.getElementById('joinRoomPanel').classList.add('hidden');
  document.getElementById('chatScreen').style.display = 'none';
}
function renderRoomList() {
  const container = document.getElementById('savedRooms');
  if (rooms.length === 0) {
    container.innerHTML = '<p class="text-sub">아직 채팅방이 없습니다.</p>';
    return;
  }
  container.innerHTML = '';
  rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-item';
    div.innerHTML = `<span>${escapeHtml(room.name)} <span class="badge">${room.type}</span></span>`;
    div.onclick = () => enterRoom(room.id);
    container.appendChild(div);
  });
}
function updateMemberList() {
  const list = document.getElementById('memberList');
  list.innerHTML = currentRoomPeers.map(id =>
    `<span class="member-tag">${id === myPeerId ? '나' : id.substring(0,6)}</span>`
  ).join('');
  document.getElementById('onlineCount').textContent = `${currentRoomPeers.length}명 접속`;
}

// ==================== 방 생성/참가 ====================
async function createRoom() {
  const name = document.getElementById('roomName').value.trim() || '새 채팅방';
  const type = document.getElementById('roomType').value;
  const password = document.getElementById('roomPassword').value;
  if (!password) return alert('방 암호를 설정하세요.');

  const room = {
    id: crypto.randomUUID(),
    name,
    type,
    password,
    createdAt: Date.now(),
    members: [myPeerId]
  };
  rooms.push(room);
  saveRooms();
  currentPassword = password;
  await deriveSharedKey(password);

  currentRoomId = room.id;
  currentRoomPeers = [myPeerId];
  updateMemberList();
  showChatScreen(room.id);

  // 초대 링크 생성 (호스트의 Offer 포함)
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.services.mozilla.com:3478' }] });
  const dc = pc.createDataChannel('chat');
  setupDataChannel(dc, 'temp'); // 첫 접속자용
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  peerConnections['temp'] = { pc, dc };

  const link = location.origin + location.pathname + '#room=' + room.id + '&offer=' + btoa(JSON.stringify(pc.localDescription));
  document.getElementById('createdLink').textContent = link;
  document.getElementById('createdRoomInfo').classList.remove('hidden');
}

async function joinRoom() {
  const password = document.getElementById('joinPassword').value;
  if (!password) return alert('방 암호를 입력하세요.');
  const offerStr = document.getElementById('joinOfferSDP').value.trim();
  let offerSDP;
  if (offerStr) {
    try { offerSDP = JSON.parse(offerStr); } catch(e) { return alert('올바르지 않은 초대 코드입니다.'); }
  } else {
    const hash = location.hash.substring(1);
    const params = new URLSearchParams(hash);
    if (params.has('offer')) {
      try { offerSDP = JSON.parse(atob(params.get('offer'))); } catch(e) { return alert('링크 오류'); }
    } else return alert('초대 코드를 붙여넣거나 초대 링크로 접속하세요.');
  }

  currentPassword = password;
  await deriveSharedKey(password);

  // 호스트(또는 초대한 피어)에게 연결
  const pc = createPeerConnection('host');
  await pc.setRemoteDescription(new RTCSessionDescription(offerSDP));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  // 데이터 채널은 ondatachannel에서 설정
  peerConnections['host'] = { pc, dc: null };
  // Answer를 상대에게 전달해야 함 → 수동으로 복사하여 전달 (임시)
  const answerCode = btoa(JSON.stringify(pc.localDescription));
  prompt('연결을 완료하려면 이 Answer 코드를 방장/초대한 사람에게 보내세요. (Ctrl+C로 복사)', answerCode);
  // 방장이 Answer를 받아서 setRemoteDescription 해야 함. 지금은 수동.
  // 이후 방에 참여한 것으로 처리 (UI는 채팅 화면으로)
  const roomId = new URLSearchParams(location.hash.substring(1)).get('room');
  if (roomId) {
    const room = rooms.find(r => r.id === roomId);
    if (room) {
      room.members.push(myPeerId);
      saveRooms();
      currentRoomId = roomId;
      currentRoomPeers = room.members;
      showChatScreen(roomId);
    } else {
      // 임시 방 등록
      const newRoom = { id: roomId, name: '참가한 채팅방', type: 'group', password, createdAt: Date.now(), members: [myPeerId] };
      rooms.push(newRoom);
      saveRooms();
      currentRoomId = roomId;
      currentRoomPeers = [myPeerId];
      showChatScreen(roomId);
    }
  }
}

function enterRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;
  currentPassword = room.password;
  deriveSharedKey(room.password);
  currentRoomId = roomId;
  currentRoomPeers = room.members || [];
  showChatScreen(roomId);
  // 기존 피어들에게 자동 재연결 시도
  room.members.forEach(pid => {
    if (pid !== myPeerId) connectToPeer(pid);
  });
}

async function inviteToRoom() {
  if (!currentRoomId) return;
  const room = rooms.find(r => r.id === currentRoomId);
  if (!room) return;
  // 임시 Offer 생성
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.services.mozilla.com:3478' }] });
  const dc = pc.createDataChannel('chat');
  setupDataChannel(dc, 'invitee');
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  peerConnections['invitee'] = { pc, dc };
  const link = location.origin + location.pathname + '#room=' + room.id + '&offer=' + btoa(JSON.stringify(pc.localDescription));
  prompt('초대 링크 (Ctrl+C로 복사)', link);
}

function leaveRoom() {
  Object.values(peerConnections).forEach(conn => conn.pc.close());
  peerConnections = {};
  currentRoomPeers = [];
  currentRoomId = null;
  showRoomList();
}

// ==================== 메시지 전송 ====================
async function sendText() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !sharedKey) return;
  const enc = await encryptData(text);
  broadcastToAll({ type: 'chat', ...enc });
  addMessageBubble(text, 'me');
  addMessageToRoom(currentRoomId, { text, sender: myPeerId, time: Date.now() });
  input.value = '';
}

function addMessageBubble(htmlOrText, who) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (who === 'me' ? 'me' : 'other');
  const content = (who === 'system') ? htmlOrText : `${htmlOrText}<div class="time">${new Date().toLocaleTimeString()}</div>`;
  div.innerHTML = `<div class="bubble">${content}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ==================== 백업/복원 ====================
function exportAllData() {
  const backup = {
    rooms: rooms.map(room => ({
      ...room,
      messages: loadMessages(room.id)
    })),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `p2p-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

async function importAllData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const text = await file.text();
  const backup = JSON.parse(text);
  if (!backup.rooms) return alert('올바른 백업 파일이 아닙니다.');
  if (confirm('기존 데이터를 덮어쓰시겠습니까? 취소하면 병합합니다.')) {
    rooms = [];
  }
  backup.rooms.forEach(r => {
    const existing = rooms.find(room => room.id === r.id);
    if (existing) {
      existing.members = [...new Set([...existing.members, ...(r.members || [])])];
    } else {
      rooms.push({
        id: r.id, name: r.name, type: r.type, password: r.password,
        createdAt: r.createdAt, members: r.members || []
      });
    }
    if (r.messages) saveMessages(r.id, r.messages);
  });
  saveRooms();
  renderRoomList();
  alert('복원 완료');
  event.target.value = '';
}

// ==================== 유틸리티 ====================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}
function copyLink(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(() => alert('복사 완료!'));
}

// ==================== 초기화 ====================
window.addEventListener('load', () => {
  renderRoomList();
  const hash = location.hash.substring(1);
  const params = new URLSearchParams(hash);
  if (params.has('offer')) {
    document.getElementById('joinOfferSDP').value = atob(params.get('offer'));
    showJoinRoom();
  }
});
window.addEventListener('hashchange', () => {
  const hash = location.hash.substring(1);
  const params = new URLSearchParams(hash);
  if (params.has('offer')) {
    document.getElementById('joinOfferSDP').value = atob(params.get('offer'));
    showJoinRoom();
  }
});
</script>
