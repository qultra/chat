<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 완전판 – 연락처, 그룹, 오픈채팅</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card: rgba(20,26,36,0.8);
      --text: #e2e8f0; --sub: #94a3b8; --accent: #5b8def; --danger: #f87171;
      --border: #1e293b; --radius: 18px; --radius-sm: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
    }
    .container {
      width: 100%; max-width: 550px; height: 95dvh;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .header {
      padding: 14px 20px; background: rgba(15,23,33,0.8);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: #4ade80; } .dot.off { background: #f87171; }

    .main { flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; }
    .main::-webkit-scrollbar { width:4px; } .main::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    .card {
      background: var(--card); backdrop-filter: blur(12px);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.06); color: white; border: 1px solid var(--border);
      padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
      text-align: center; backdrop-filter: blur(10px);
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.small { padding: 6px 12px; font-size: 0.8rem; width: auto; }
    .btn-group { display: flex; gap: 6px; }

    input[type=text], input[type=password], textarea {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 0.95rem; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    #chatScreen { display: none; flex-direction: column; flex:1; }
    #messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px;
      padding: 4px 0;
    }
    .msg { display: flex; }
    .msg.me { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 8px 14px; border-radius: 18px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
      animation: fadeUp 0.2s ease;
    }
    .msg.me .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:4px; }
    .msg.other .bubble { border-bottom-left-radius:4px; }
    .time { font-size: 0.6rem; color: var(--sub); margin-top: 2px; text-align: right; }
    .file-inline img { max-width: 160px; max-height: 100px; border-radius: 10px; }
    .input-bar { display: flex; gap: 6px; padding: 10px 0 0; }
    #msgInput { flex:1; }
    .attach-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--accent); }

    .room-list { display: flex; flex-direction: column; gap: 6px; }
    .room-item {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
    }
    .room-item:hover { background: rgba(255,255,255,0.06); }
    .hidden { display: none !important; }
    .text-sub { color: var(--sub); font-size: 0.8rem; }
    .mt { margin-top: 8px; }
    .mb { margin-bottom: 8px; }
    .link-box { word-break: break-all; background: #0f131c; padding: 8px; border-radius: 10px; font-size: 0.7rem; margin: 6px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✦ P2P 채팅</h1>
    <div class="status-dot">
      <span id="connDot" class="dot off"></span>
      <span id="connLabel">오프라인</span>
    </div>
  </div>
  <div class="main" id="mainArea">
    <!-- 메인 메뉴: 채팅방 목록 -->
    <div id="roomListPanel">
      <div class="card">
        <div class="btn-group">
          <button class="btn primary" onclick="showCreateRoom()">✨ 새 채팅방</button>
          <button class="btn" onclick="showJoinRoom()">📩 참가</button>
        </div>
      </div>
      <div id="savedRooms" class="room-list">
        <!-- 저장된 채팅방 목록이 여기에 렌더링 -->
      </div>
    </div>

    <!-- 채팅방 생성 화면 -->
    <div id="createRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 뒤로</button>
        <input type="text" id="roomName" placeholder="채팅방 이름" class="mt">
        <input type="password" id="roomPassword" placeholder="암호 (공유할 비밀번호)" class="mt">
        <button class="btn primary mt" onclick="createRoom()">방 만들기</button>
      </div>
      <div id="createdRoomInfo" class="hidden card">
        <p><strong>초대 링크</strong></p>
        <div class="link-box" id="createdLink"></div>
        <button class="btn mt" onclick="copyLink('createdLink')">📋 링크 복사</button>
      </div>
    </div>

    <!-- 채팅방 참가 화면 -->
    <div id="joinRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 뒤로</button>
        <input type="password" id="joinPassword" placeholder="암호 (방장에게 받은 비밀번호)" class="mt">
        <textarea id="joinOfferSDP" placeholder="또는 초대 코드 붙여넣기" class="mt" rows="3"></textarea>
        <button class="btn primary mt" onclick="joinRoom()">참가</button>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0;">
        <span id="currentRoomName" style="font-weight:600;"></span>
        <button class="btn small" onclick="leaveRoom()">나가기</button>
      </div>
      <div id="messages"></div>
      <div class="input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="msgInput" placeholder="메시지..." autocomplete="off">
        <button class="btn primary small" onclick="sendText()">전송</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
// ==================== 데이터 관리 ====================
const ROOMS_KEY = 'p2p_rooms_v1';
let rooms = JSON.parse(localStorage.getItem(ROOMS_KEY) || '[]');
let currentRoomId = null;
let currentPassword = '';
let sharedKey = null;
let pc, dc, isOfferer = false;
let myPeerId = 'peer-' + Math.random().toString(36).substr(2,9);

function saveRooms() { localStorage.setItem(ROOMS_KEY, JSON.stringify(rooms)); }

// ==================== 화면 전환 ====================
function showRoomList() {
  hideAllPanels();
  document.getElementById('roomListPanel').classList.remove('hidden');
  renderRoomList();
}
function showCreateRoom() {
  hideAllPanels();
  document.getElementById('createRoomPanel').classList.remove('hidden');
}
function showJoinRoom() {
  hideAllPanels();
  document.getElementById('joinRoomPanel').classList.remove('hidden');
}
function showChatScreen(roomId) {
  hideAllPanels();
  currentRoomId = roomId;
  document.getElementById('chatScreen').style.display = 'flex';
  const room = rooms.find(r => r.id === roomId);
  document.getElementById('currentRoomName').textContent = room ? room.name : '채팅';
  document.getElementById('messages').innerHTML = '';
}
function hideAllPanels() {
  document.getElementById('roomListPanel').classList.add('hidden');
  document.getElementById('createRoomPanel').classList.add('hidden');
  document.getElementById('joinRoomPanel').classList.add('hidden');
  document.getElementById('chatScreen').style.display = 'none';
}

function renderRoomList() {
  const container = document.getElementById('savedRooms');
  container.innerHTML = rooms.length === 0 ? '<p class="text-sub">아직 채팅방이 없습니다.</p>' : '';
  rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-item';
    div.innerHTML = `<span>${escapeHtml(room.name)} (${room.type})</span>`;
    div.onclick = () => enterRoom(room.id);
    container.appendChild(div);
  });
}

// ==================== 채팅방 생성 ====================
async function createRoom() {
  const name = document.getElementById('roomName').value.trim() || '채팅방';
  const password = document.getElementById('roomPassword').value;
  if (!password) return alert('암호를 입력하세요.');
  
  const room = {
    id: crypto.randomUUID(),
    name,
    password,
    type: '1:1', // 기본
    createdAt: Date.now()
  };
  rooms.push(room);
  saveRooms();
  currentPassword = password;
  await deriveSharedKey(password);
  
  // WebRTC Offer 생성
  isOfferer = true;
  initPC();
  dc = pc.createDataChannel('chat', { ordered: true });
  setupDC();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitIce();
  
  const offerBase64 = btoa(JSON.stringify(pc.localDescription));
  const link = window.location.origin + window.location.pathname + '#room=' + room.id + '&offer=' + offerBase64;
  document.getElementById('createdLink').textContent = link;
  document.getElementById('createdRoomInfo').classList.remove('hidden');
  
  // 연결 성공 시 채팅방 입장
  currentRoomId = room.id;
}

async function enterRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;
  currentPassword = room.password;
  await deriveSharedKey(room.password);
  showChatScreen(roomId);
}

async function joinRoom() {
  const password = document.getElementById('joinPassword').value;
  const offerStr = document.getElementById('joinOfferSDP').value.trim();
  
  if (!password) return alert('암호를 입력하세요.');
  let offer;
  if (offerStr) {
    try { offer = JSON.parse(offerStr); } catch(e) { return alert('올바르지 않은 초대 코드입니다.'); }
  } else {
    // URL에서 추출 시도
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    if (params.has('offer')) {
      try { offer = JSON.parse(atob(params.get('offer'))); } catch(e) { return alert('링크가 올바르지 않습니다.'); }
    } else return alert('초대 코드를 붙여넣거나 초대 링크를 여세요.');
  }
  
  currentPassword = password;
  await deriveSharedKey(password);
  isOfferer = false;
  initPC();
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce();
  
  // 방 목록에 추가
  const room = {
    id: crypto.randomUUID(),
    name: '참가한 채팅방',
    password,
    type: '1:1',
    createdAt: Date.now()
  };
  rooms.push(room);
  saveRooms();
  currentRoomId = room.id;
  showChatScreen(room.id);
}

function leaveRoom() {
  closeConnection();
  currentRoomId = null;
  showRoomList();
}

// ==================== WebRTC ====================
function initPC() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.services.mozilla.com:3478' }] });
  pc.oniceconnectionstatechange = () => {
    const ok = pc.iceConnectionState === 'connected';
    document.getElementById('connDot').className = 'dot ' + (ok ? 'on' : 'off');
    document.getElementById('connLabel').textContent = ok ? '연결됨' : '오프라인';
    if (!ok && pc.iceConnectionState === 'disconnected') {
      // 연결 끊김 표시
    }
  };
  pc.ondatachannel = (e) => { dc = e.channel; setupDC(); };
}
function setupDC() {
  dc.onopen = () => {
    document.getElementById('connDot').className = 'dot on';
    document.getElementById('connLabel').textContent = '연결됨';
  };
  dc.onmessage = handleMessage;
}
function waitIce() {
  return new Promise(r => {
    if (pc.iceGatheringState === 'complete') r();
    else pc.addEventListener('icegatheringstatechange', () => {
      if (pc.iceGatheringState === 'complete') r();
    });
  });
}
function closeConnection() {
  if (pc) { pc.close(); pc = null; }
  dc = null;
  sharedKey = null;
}

// ==================== 암호화 ====================
async function deriveSharedKey(password) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
  sharedKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('p2p-salt'), iterations: 100000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encrypt(msg) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, new TextEncoder().encode(msg));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decrypt(data) {
  const iv = new Uint8Array(data.iv);
  const ct = new Uint8Array(data.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
  return new TextDecoder().decode(plain);
}

// ==================== 메시지 전송/수신 ====================
async function sendText() {
  const inp = document.getElementById('msgInput');
  const t = inp.value.trim();
  if (!t || !dc || dc.readyState !== 'open' || !sharedKey) return;
  const enc = await encrypt(t);
  dc.send(JSON.stringify({ type: 'text', ...enc }));
  addMessage(t, 'me');
  inp.value = '';
}
function handleMessage(e) {
  if (e.data instanceof ArrayBuffer) return;
  const d = JSON.parse(e.data);
  if (d.type === 'text' && sharedKey) {
    decrypt(d).then(p => addMessage(p, 'other')).catch(() => addMessage('⚠️ 복호화 실패', 'system'));
  }
}
function addMessage(t, who) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (who === 'me' ? 'me' : 'other');
  div.innerHTML = `<div class="bubble">${escapeHtml(t)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ==================== 유틸 ====================
function copyLink(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(() => alert('복사 완료!'));
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

// ==================== 초기화 ====================
window.addEventListener('hashchange', () => {
  // 링크로 접근 시 자동 처리
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  if (params.has('offer')) {
    document.getElementById('joinOfferSDP').value = atob(params.get('offer'));
    showJoinRoom();
  }
});
window.addEventListener('load', () => {
  renderRoomList();
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  if (params.has('offer')) {
    document.getElementById('joinOfferSDP').value = atob(params.get('offer'));
    showJoinRoom();
  }
});
</script>
</body>
</html>
