<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 메신저 – 완전판</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card: rgba(20,26,36,0.8);
      --text: #e2e8f0; --sub: #94a3b8; --accent: #5b8def; --danger: #f87171;
      --border: #1e293b; --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
    }
    .container {
      width: 100%; max-width: 550px; height: 95dvh;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .header {
      padding: 14px 20px; background: rgba(15,23,33,0.8);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: #4ade80; } .dot.off { background: #f87171; }

    .main { flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; }
    .main::-webkit-scrollbar { width:4px; } .main::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    .card {
      background: var(--card); backdrop-filter: blur(12px);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.06); color: white; border: 1px solid var(--border);
      padding: 10px 16px; border-radius: 12px; cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
      text-align: center; backdrop-filter: blur(10px);
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.small { padding: 6px 12px; font-size: 0.8rem; width: auto; }
    .btn-group { display: flex; gap: 6px; }

    input[type=text], input[type=password], textarea {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 14px; font-size: 0.95rem; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    #chatScreen { display: none; flex-direction: column; flex:1; }
    #messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px;
      padding: 4px 0;
    }
    .msg { display: flex; margin-bottom: 4px; }
    .msg.me { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 8px 14px; border-radius: 18px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .msg.me .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:4px; }
    .msg.other .bubble { border-bottom-left-radius:4px; }
    .time { font-size: 0.6rem; color: var(--sub); margin-top: 2px; text-align: right; }
    .file-inline img { max-width: 160px; max-height: 100px; border-radius: 10px; }
    .input-bar { display: flex; gap: 6px; padding: 10px 0 0; }
    #msgInput { flex:1; }
    .attach-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--accent); }

    .room-list { display: flex; flex-direction: column; gap: 6px; }
    .room-item {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
    }
    .room-item:hover { background: rgba(255,255,255,0.06); }
    .hidden { display: none !important; }
    .text-sub { color: var(--sub); font-size: 0.8rem; }
    .mt { margin-top: 8px; }
    .mb { margin-bottom: 8px; }
    .link-box { word-break: break-all; background: #0f131c; padding: 8px; border-radius: 10px; font-size: 0.7rem; margin: 6px 0; }
    .member-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .member-tag { background: rgba(91,141,239,0.2); padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; }
    .type-selector { display: flex; gap: 8px; margin: 8px 0; }
    .type-btn { flex:1; padding: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; }
    .type-btn.active { background: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✦ P2P 메신저</h1>
    <div class="status-dot">
      <span id="connDot" class="dot off"></span>
      <span id="connLabel">오프라인</span>
    </div>
  </div>
  <div class="main" id="mainArea">
    <!-- 메인: 채팅방 목록 -->
    <div id="roomListPanel">
      <div class="card">
        <div class="btn-group">
          <button class="btn primary" onclick="showCreateRoom()">✨ 새 채팅방</button>
          <button class="btn" onclick="showJoinRoom()">📩 코드로 참가</button>
        </div>
        <div class="btn-group mt">
          <button class="btn small" onclick="exportAllData()">📥 전체 백업</button>
          <button class="btn small" onclick="document.getElementById('restoreFile').click()">📤 복원</button>
        </div>
        <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="importAllData(event)">
      </div>
      <div id="savedRooms" class="room-list"></div>
    </div>

    <!-- 방 만들기 -->
    <div id="createRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 목록</button>
        <div class="type-selector">
          <div class="type-btn active" data-type="1:1" onclick="selectType('1:1', this)">1:1 채팅</div>
          <div class="type-btn" data-type="group" onclick="selectType('group', this)">그룹</div>
          <div class="type-btn" data-type="open" onclick="selectType('open', this)">오픈 채널</div>
        </div>
        <input type="text" id="roomName" placeholder="방 이름" class="mt">
        <input type="password" id="roomPassword" placeholder="방 암호" class="mt">
        <button class="btn primary mt" onclick="createRoom()">방 만들기</button>
      </div>
      <div id="createdRoomInfo" class="hidden card">
        <p><strong>초대 링크</strong></p>
        <div class="link-box" id="createdLink"></div>
        <button class="btn mt" onclick="copyLink('createdLink')">📋 복사</button>
      </div>
    </div>

    <!-- 방 참가 -->
    <div id="joinRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 목록</button>
        <input type="password" id="joinPassword" placeholder="방 암호" class="mt">
        <textarea id="joinOfferSDP" placeholder="또는 초대 코드 붙여넣기" class="mt" rows="2"></textarea>
        <button class="btn primary mt" onclick="joinRoom()">참가</button>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0;">
        <span id="currentRoomName" style="font-weight:600;"></span>
        <span id="onlineCount" class="text-sub"></span>
        <div>
          <button class="btn small" onclick="inviteToRoom()">➕ 초대</button>
          <button class="btn small" onclick="leaveRoom()">나가기</button>
        </div>
      </div>
      <div class="member-list" id="memberList"></div>
      <div id="messages"></div>
      <div class="input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="msgInput" placeholder="메시지..." autocomplete="off">
        <button class="btn primary small" onclick="sendText()">전송</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
// ==================== 데이터 관리 ====================
const ROOMS_KEY = 'p2p_rooms_v4';
const MSG_PREFIX = 'p2p_msgs_';
let rooms = JSON.parse(localStorage.getItem(ROOMS_KEY) || '[]');
let currentRoomId = null;
let currentPassword = '';
let sharedKey = null;
let peerConnections = {}; // { peerId: { pc, dc } }
let myPeerId = 'peer-' + crypto.randomUUID().substring(0,8);
let currentRoomPeers = [];
let selectedRoomType = '1:1';

// ==================== 초기화 ====================
window.addEventListener('load', () => {
  renderRoomList();
  // 링크를 통해 접근한 경우
  const hash = window.location.hash.substring(1);
  if (hash) handleHash(hash);
});
window.addEventListener('hashchange', () => {
  const hash = window.location.hash.substring(1);
  if (hash) handleHash(hash);
});

function handleHash(hash) {
  const params = new URLSearchParams(hash);
  if (params.has('offer')) {
    document.getElementById('joinOfferSDP').value = atob(params.get('offer'));
    showJoinRoom();
  }
}

// ==================== UI 전환 ====================
function showRoomList() {
  hideAllPanels();
  document.getElementById('roomListPanel').classList.remove('hidden');
  renderRoomList();
}
function showCreateRoom() {
  hideAllPanels();
  document.getElementById('createRoomPanel').classList.remove('hidden');
}
function showJoinRoom() {
  hideAllPanels();
  document.getElementById('joinRoomPanel').classList.remove('hidden');
}
function showChatScreen(roomId) {
  hideAllPanels();
  currentRoomId = roomId;
  document.getElementById('chatScreen').style.display = 'flex';
  const room = rooms.find(r => r.id === roomId);
  document.getElementById('currentRoomName').textContent = room ? room.name : '채팅';
  document.getElementById('messages').innerHTML = '';
  const msgs = loadMessages(roomId);
  msgs.forEach(msg => {
    addMessage(msg.text, msg.sender === myPeerId ? 'me' : 'other');
  });
  updateMemberList();
}
function hideAllPanels() {
  document.getElementById('roomListPanel').classList.add('hidden');
  document.getElementById('createRoomPanel').classList.add('hidden');
  document.getElementById('joinRoomPanel').classList.add('hidden');
  document.getElementById('chatScreen').style.display = 'none';
}

function selectType(type, el) {
  selectedRoomType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function renderRoomList() {
  const container = document.getElementById('savedRooms');
  container.innerHTML = rooms.length === 0 ? '<p class="text-sub">아직 채팅방이 없습니다.</p>' : '';
  rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-item';
    div.innerHTML = `<span>${escapeHtml(room.name)} <span class="text-sub">[${room.type}]</span></span><span class="text-sub">${room.members ? room.members.length : 0}명</span>`;
    div.onclick = () => enterRoom(room.id);
    container.appendChild(div);
  });
}

// ==================== 방 생성 / 참가 ====================
async function createRoom() {
  const name = document.getElementById('roomName').value.trim() || '대화방';
  const password = document.getElementById('roomPassword').value;
  if (!password) return alert('방 암호를 설정하세요.');

  const room = {
    id: crypto.randomUUID(),
    name,
    password,
    type: selectedRoomType,
    createdAt: Date.now(),
    members: [myPeerId]
  };
  rooms.push(room);
  saveRooms();
  currentPassword = password;
  await deriveSharedKey(password);

  // 연결 준비 (내 Offer 생성)
  const offer = await createLocalOffer();
  const link = window.location.origin + window.location.pathname + '#room=' + room.id + '&offer=' + btoa(JSON.stringify(pc.localDescription));
  document.getElementById('createdLink').textContent = link;
  document.getElementById('createdRoomInfo').classList.remove('hidden');

  currentRoomId = room.id;
  currentRoomPeers = [myPeerId];
  updateMemberList();
  showChatScreen(room.id);
}

async function enterRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;
  currentPassword = room.password;
  await deriveSharedKey(room.password);
  currentRoomId = roomId;
  currentRoomPeers = room.members ? [...room.members] : [];
  // 기존 연결 초기화
  Object.values(peerConnections).forEach(c => c.pc.close());
  peerConnections = {};
  showChatScreen(roomId);
}

async function joinRoom() {
  const password = document.getElementById('joinPassword').value;
  const offerStr = document.getElementById('joinOfferSDP').value.trim();
  if (!password) return alert('방 암호를 입력하세요.');

  let offer;
  if (offerStr) {
    try { offer = JSON.parse(offerStr); } catch (e) { return alert('초대 코드가 올바르지 않습니다.'); }
  } else {
    alert('초대 코드를 붙여넣거나 초대 링크를 여세요.');
    return;
  }

  currentPassword = password;
  await deriveSharedKey(password);

  // 피어 연결
  await connectToPeer(offer, 'host');

  // 방 정보 저장
  const hash = window.location.hash.substring(1);
  const roomId = new URLSearchParams(hash).get('room') || crypto.randomUUID();
  let room = rooms.find(r => r.id === roomId);
  if (room) {
    if (!room.members.includes(myPeerId)) room.members.push(myPeerId);
  } else {
    room = { id: roomId, name: '참가한 방', password, type: 'group', createdAt: Date.now(), members: [myPeerId] };
    rooms.push(room);
  }
  saveRooms();
  currentRoomId = room.id;
  currentRoomPeers = room.members;
  updateMemberList();
  showChatScreen(room.id);
}

async function inviteToRoom() {
  const offer = await createLocalOffer();
  const link = window.location.origin + window.location.pathname + '#room=' + currentRoomId + '&offer=' + btoa(JSON.stringify(pc.localDescription));
  prompt('초대 링크 (Ctrl+C로 복사)', link);
}

function leaveRoom() {
  Object.values(peerConnections).forEach(c => c.pc.close());
  peerConnections = {};
  currentRoomId = null;
  showRoomList();
}

// ==================== WebRTC 연결 관리 ====================
async function createLocalOffer() {
  const newPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.services.mozilla.com:3478' }] });
  const newDc = newPc.createDataChannel('chat');
  setupDataChannel(newDc, 'local-offer');
  const offer = await newPc.createOffer();
  await newPc.setLocalDescription(offer);
  await waitIce(newPc);
  peerConnections['local-offer'] = { pc: newPc, dc: newDc };
  return offer;
}

async function connectToPeer(offer, peerId) {
  const newPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.services.mozilla.com:3478' }] });
  newPc.ondatachannel = (event) => {
    setupDataChannel(event.channel, peerId);
  };
  await newPc.setRemoteDescription(offer);
  const answer = await newPc.createAnswer();
  await newPc.setLocalDescription(answer);
  await waitIce(newPc);
  peerConnections[peerId] = { pc: newPc, dc: null };
}

function setupDataChannel(dc, peerId) {
  dc.onopen = () => {
    if (!currentRoomPeers.includes(peerId)) {
      currentRoomPeers.push(peerId);
      updateMemberList();
      const room = rooms.find(r => r.id === currentRoomId);
      if (room && !room.members.includes(peerId)) {
        room.members.push(peerId);
        saveRooms();
      }
    }
    // 연결 상태 업데이트
    document.getElementById('connDot').className = 'dot on';
    document.getElementById('connLabel').textContent = '연결됨';
  };
  dc.onmessage = (e) => handleMessage(e, peerId);
  dc.onclose = () => {
    document.getElementById('connDot').className = 'dot off';
    document.getElementById('connLabel').textContent = '오프라인';
  };
}

async function handleMessage(e, peerId) {
  if (e.data instanceof ArrayBuffer) return; // 파일은 나중에
  const data = JSON.parse(e.data);
  if (data.type === 'text') {
    try {
      const plain = await decrypt(data);
      const text = peerId === 'local-offer' ? plain : `${peerId.substring(0,6)}: ${plain}`;
      addMessage(text, peerId === myPeerId ? 'me' : 'other');
      saveMessage(currentRoomId, { text: plain, sender: peerId, time: Date.now() });
    } catch (err) {
      addMessage('⚠️ 복호화 실패', 'system');
    }
  }
}

function waitIce(pc) {
  return new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') resolve();
    else pc.addEventListener('icegatheringstatechange', () => {
      if (pc.iceGatheringState === 'complete') resolve();
    });
  });
}

// ==================== 암호화 ====================
async function deriveSharedKey(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
  sharedKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('p2p-chat-salt'), iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encrypt(plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, new TextEncoder().encode(plaintext));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}

async function decrypt(data) {
  const iv = new Uint8Array(data.iv);
  const ct = new Uint8Array(data.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
  return new TextDecoder().decode(plain);
}

// ==================== 메시지 전송 ====================
async function sendText() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !sharedKey) return;
  const enc = await encrypt(text);
  // 모든 피어에게 전송
  Object.values(peerConnections).forEach(conn => {
    if (conn.dc && conn.dc.readyState === 'open') {
      conn.dc.send(JSON.stringify({ type: 'text', ...enc }));
    }
  });
  addMessage(text, 'me');
  saveMessage(currentRoomId, { text, sender: myPeerId, time: Date.now() });
  input.value = '';
}

// ==================== 메시지 히스토리 ====================
function loadMessages(roomId) {
  const data = localStorage.getItem(MSG_PREFIX + roomId);
  return data ? JSON.parse(data) : [];
}
function saveMessage(roomId, msgObj) {
  const msgs = loadMessages(roomId);
  msgs.push(msgObj);
  if (msgs.length > 500) msgs.splice(0, msgs.length - 500);
  localStorage.setItem(MSG_PREFIX + roomId, JSON.stringify(msgs));
}
function saveRooms() {
  localStorage.setItem(ROOMS_KEY, JSON.stringify(rooms));
}

// ==================== 백업 / 복원 ====================
function exportAllData() {
  const backup = {
    rooms: rooms.map(room => ({
      ...room,
      messages: loadMessages(room.id)
    })),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `p2p-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function importAllData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const backup = JSON.parse(text);
    if (!backup.rooms) throw new Error('Invalid format');
    if (confirm('기존 데이터를 덮어쓰시겠습니까? "취소"를 누르면 병합됩니다.')) {
      rooms = [];
    }
    backup.rooms.forEach(room => {
      const existing = rooms.find(r => r.id === room.id);
      if (existing) {
        existing.name = room.name;
        existing.password = room.password;
        existing.members = [...new Set([...existing.members, ...(room.members || [])])];
      } else {
        rooms.push({ ...room, messages: undefined });
      }
      if (room.messages) {
        localStorage.setItem(MSG_PREFIX + room.id, JSON.stringify(room.messages));
      }
    });
    saveRooms();
    renderRoomList();
    alert('복원 완료!');
  } catch (e) {
    alert('백업 파일이 올바르지 않습니다.');
  }
  event.target.value = '';
}

// ==================== 유틸리티 ====================
function copyLink(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(() => alert('복사 완료!'));
}
function addMessage(t, who) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (who === 'me' ? 'me' : 'other');
  div.innerHTML = `<div class="bubble">${escapeHtml(t)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function updateMemberList() {
  const list = document.getElementById('memberList');
  list.innerHTML = currentRoomPeers.map(id => `<span class="member-tag">${id === myPeerId ? '나' : id.substring(0,6)}</span>`).join('');
  document.getElementById('onlineCount').textContent = `${currentRoomPeers.length}명 접속`;
}
</script>
</body>
</html>
