<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 메신저 – 서버 없이 완전한 프라이버시</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card: rgba(20,26,36,0.8);
      --text: #e2e8f0; --sub: #94a3b8; --accent: #5b8def; --danger: #f87171;
      --border: #1e293b; --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
    }
    .container {
      width: 100%; max-width: 550px; height: 95dvh;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .header {
      padding: 14px 20px; background: rgba(15,23,33,0.8);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: #4ade80; } .dot.off { background: #f87171; }

    .main { flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; }
    .main::-webkit-scrollbar { width:4px; } .main::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    .card {
      background: var(--card); backdrop-filter: blur(12px);
      border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.06); color: white; border: 1px solid var(--border);
      padding: 10px 16px; border-radius: 12px; cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
      text-align: center; backdrop-filter: blur(10px);
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.small { padding: 6px 12px; font-size: 0.8rem; width: auto; }
    .btn-group { display: flex; gap: 6px; }

    input[type=text], input[type=password], textarea {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 14px; font-size: 0.95rem; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    #chatScreen { display: none; flex-direction: column; flex:1; }
    #messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px;
      padding: 4px 0;
    }
    .msg { display: flex; margin-bottom: 4px; }
    .msg.me { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 8px 14px; border-radius: 18px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .msg.me .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:4px; }
    .msg.other .bubble { border-bottom-left-radius:4px; }
    .time { font-size: 0.6rem; color: var(--sub); margin-top: 2px; text-align: right; }
    .input-bar { display: flex; gap: 6px; padding: 10px 0 0; }
    #msgInput { flex:1; }
    .attach-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--accent); }

    .room-list { display: flex; flex-direction: column; gap: 6px; }
    .room-item {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
    }
    .room-item:hover { background: rgba(255,255,255,0.06); }
    .hidden { display: none !important; }
    .text-sub { color: var(--sub); font-size: 0.8rem; }
    .mt { margin-top: 8px; }
    .mb { margin-bottom: 8px; }
    .link-box { word-break: break-all; background: #0f131c; padding: 8px; border-radius: 10px; font-size: 0.7rem; margin: 6px 0; }
    .member-tag { background: rgba(91,141,239,0.2); padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; display: inline-block; margin: 2px; }
    .system-msg { color: var(--sub); font-style: italic; text-align: center; margin: 6px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✦ P2P 메신저</h1>
    <div class="status-dot">
      <span id="connDot" class="dot off"></span>
      <span id="connLabel">오프라인</span>
    </div>
  </div>
  <div class="main" id="mainArea">
    <!-- 메인 목록 화면 -->
    <div id="roomListPanel">
      <div class="card">
        <div class="btn-group">
          <button class="btn primary" onclick="showCreateRoom()">✨ 새 채팅방</button>
          <button class="btn" onclick="showJoinRoom()">📩 코드로 참가</button>
        </div>
        <div class="btn-group mt">
          <button class="btn small" onclick="exportAllData()">📥 전체 백업</button>
          <button class="btn small" onclick="document.getElementById('restoreFile').click()">📤 복원</button>
          <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="importAllData(event)">
        </div>
      </div>
      <div id="savedRooms" class="room-list"></div>
    </div>

    <!-- 방 만들기 -->
    <div id="createRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 목록</button>
        <input type="text" id="roomName" placeholder="채팅방 이름" class="mt">
        <select id="roomType" class="mt" style="width:100%; background:#0f131c; color:var(--text); padding:10px; border-radius:12px; border:1px solid var(--border);">
          <option value="direct">1:1 채팅</option>
          <option value="group">그룹 채팅</option>
          <option value="open">오픈 채널</option>
        </select>
        <input type="password" id="roomPassword" placeholder="방 암호 (필수)" class="mt">
        <button class="btn primary mt" onclick="createRoom()">방 만들기</button>
      </div>
      <div id="createdRoomInfo" class="hidden card">
        <p><strong>초대 링크</strong></p>
        <div class="link-box" id="createdLink"></div>
        <button class="btn mt" onclick="copyLink('createdLink')">📋 링크 복사</button>
        <p class="text-sub mt">이 링크와 암호를 상대방에게 공유하세요.</p>
      </div>
    </div>

    <!-- 방 참가 -->
    <div id="joinRoomPanel" class="hidden">
      <div class="card">
        <button class="btn small" onclick="showRoomList()">← 목록</button>
        <input type="password" id="joinPassword" placeholder="방 암호" class="mt">
        <textarea id="joinOfferSDP" placeholder="또는 초대 링크/코드를 여기에 붙여넣으세요" class="mt" rows="3"></textarea>
        <button class="btn primary mt" onclick="joinRoom()">참가</button>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0;">
        <span id="currentRoomName" style="font-weight:600;"></span>
        <span id="onlineCount" class="text-sub"></span>
        <div class="btn-group">
          <button class="btn small" onclick="inviteToRoom()">➕ 초대</button>
          <button class="btn small" onclick="leaveRoom()">나가기</button>
        </div>
      </div>
      <div id="memberList" style="margin-bottom:4px;"></div>
      <div id="messages"></div>
      <div class="input-bar">
        <input type="text" id="msgInput" placeholder="메시지..." autocomplete="off">
        <button class="btn primary small" onclick="sendText()">전송</button>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== 데이터 저장소 ====================
const ROOMS_KEY = 'p2p_rooms_v4';
const MSG_PREFIX = 'p2p_msgs_';
let rooms = JSON.parse(localStorage.getItem(ROOMS_KEY) || '[]');
let currentRoomId = null;
let currentRoom = null;
let sharedKey = null;            // AES-GCM CryptoKey
let peerConnections = {};       // { peerId: { pc, dc } }
let myPeerId = 'peer-' + crypto.randomUUID().substring(0,8);

// ==================== 방/메시지 관리 ====================
function saveRooms() { localStorage.setItem(ROOMS_KEY, JSON.stringify(rooms)); }
function loadMessages(roomId) {
  return JSON.parse(localStorage.getItem(MSG_PREFIX + roomId) || '[]');
}
function saveMessages(roomId, msgs) {
  localStorage.setItem(MSG_PREFIX + roomId, JSON.stringify(msgs.slice(-500)));
}
function addMessageToRoom(roomId, msgObj) {
  const msgs = loadMessages(roomId);
  msgs.push(msgObj);
  saveMessages(roomId, msgs);
}

// ==================== 백업/복원 ====================
function exportAllData() {
  const backup = {
    rooms: rooms.map(room => ({ ...room, messages: loadMessages(room.id) })),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `p2p-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
async function importAllData(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const backup = JSON.parse(text);
    if (!backup.rooms) throw new Error('형식 오류');
    if (confirm('기존 데이터를 모두 덮어씁니다. 계속할까요?')) {
      rooms = [];
      backup.rooms.forEach(room => {
        const { messages, ...roomData } = room;
        rooms.push(roomData);
        saveMessages(room.id, messages || []);
      });
      saveRooms();
      renderRoomList();
      alert('복원 완료');
    }
  } catch (e) { alert('백업 파일이 올바르지 않습니다.'); }
  event.target.value = '';
}

// ==================== 화면 전환 ====================
function showRoomList() {
  hideAllPanels();
  document.getElementById('roomListPanel').classList.remove('hidden');
  renderRoomList();
}
function showCreateRoom() {
  hideAllPanels();
  document.getElementById('createRoomPanel').classList.remove('hidden');
  document.getElementById('createdRoomInfo').classList.add('hidden');
  document.getElementById('roomName').value = '';
  document.getElementById('roomPassword').value = '';
}
function showJoinRoom() {
  hideAllPanels();
  document.getElementById('joinRoomPanel').classList.remove('hidden');
  document.getElementById('joinPassword').value = '';
  document.getElementById('joinOfferSDP').value = '';
}
function showChatScreen(roomId) {
  hideAllPanels();
  currentRoomId = roomId;
  currentRoom = rooms.find(r => r.id === roomId);
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('currentRoomName').textContent = currentRoom?.name || '채팅';
  document.getElementById('messages').innerHTML = '';
  // 이전 메시지 표시
  const msgs = loadMessages(roomId);
  msgs.forEach(msg => addMessageToChat(msg.text, msg.sender === myPeerId ? 'me' : 'other'));
  renderMembers();
}
function hideAllPanels() {
  document.getElementById('roomListPanel').classList.add('hidden');
  document.getElementById('createRoomPanel').classList.add('hidden');
  document.getElementById('joinRoomPanel').classList.add('hidden');
  document.getElementById('chatScreen').style.display = 'none';
}
function renderMembers() {
  const container = document.getElementById('memberList');
  container.innerHTML = '';
  if (currentRoom) {
    currentRoom.members.forEach(id => {
      const tag = document.createElement('span');
      tag.className = 'member-tag';
      tag.textContent = id === myPeerId ? '나' : id.substring(0,6);
      container.appendChild(tag);
    });
  }
  document.getElementById('onlineCount').textContent = `${currentRoom?.members.length || 0}명`;
}

// ==================== 방 목록 렌더링 ====================
function renderRoomList() {
  const container = document.getElementById('savedRooms');
  container.innerHTML = rooms.length === 0 ? '<p class="text-sub">아직 채팅방이 없습니다.</p>' : '';
  rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = 'room-item';
    div.innerHTML = `<span>${escapeHtml(room.name)} <span class="text-sub">(${room.type})</span></span>`;
    div.onclick = () => enterRoom(room.id);
    container.appendChild(div);
  });
}

// ==================== 방 생성 ====================
async function createRoom() {
  const name = document.getElementById('roomName').value.trim() || '채팅방';
  const password = document.getElementById('roomPassword').value;
  const type = document.getElementById('roomType').value;
  if (!password) return alert('방 암호를 설정하세요.');

  const room = {
    id: crypto.randomUUID(),
    name,
    password,
    type,
    createdAt: Date.now(),
    members: [myPeerId]
  };
  rooms.push(room);
  saveRooms();
  currentRoom = room;
  currentRoomId = room.id;
  await deriveSharedKey(password);

  // 연결 준비: Offer 생성
  const offer = await createLocalOfferAndSetup('initiator');
  const link = window.location.origin + window.location.pathname + '#room=' + room.id + '&offer=' + btoa(JSON.stringify(offer));
  document.getElementById('createdLink').textContent = link;
  document.getElementById('createdRoomInfo').classList.remove('hidden');

  // 채팅 화면으로 전환
  showChatScreen(room.id);
}

// ==================== 방 들어가기 (목록에서) ====================
async function enterRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;
  currentRoom = room;
  currentRoomId = roomId;
  await deriveSharedKey(room.password);
  showChatScreen(roomId);
  // 이미 연결된 피어가 없으면 새 연결 생성 (재접속 용도)
  if (Object.keys(peerConnections).length === 0) {
    await createLocalOfferAndSetup('reconnect');
  }
}

// ==================== 방 참가 (코드/링크) ====================
async function joinRoom() {
  const password = document.getElementById('joinPassword').value;
  const input = document.getElementById('joinOfferSDP').value.trim();
  if (!password) return alert('방 암호를 입력하세요.');

  let offer;
  if (input.startsWith('{')) {
    try { offer = JSON.parse(input); } catch(e) { return alert('코드 형식이 잘못되었습니다.'); }
  } else {
    // 링크에서 추출
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    if (params.has('offer')) {
      try { offer = JSON.parse(atob(params.get('offer'))); } catch(e) { return alert('링크 오류'); }
    } else if (input.startsWith('http')) {
      const url = new URL(input);
      const hp = new URLSearchParams(url.hash.substring(1));
      if (hp.has('offer')) {
        try { offer = JSON.parse(atob(hp.get('offer'))); } catch(e) { return alert('링크 오류'); }
      } else return alert('유효한 초대 링크가 아닙니다.');
    } else return alert('초대 코드나 링크가 필요합니다.');
  }

  currentPassword = password;
  await deriveSharedKey(password);

  // 피어 연결
  const peerId = 'peer-' + crypto.randomUUID().substring(0,8);
  await connectToPeer(offer, peerId);

  // 방 정보 처리
  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  const roomId = hashParams.get('room') || crypto.randomUUID();
  let room = rooms.find(r => r.id === roomId);
  if (!room) {
    room = {
      id: roomId,
      name: '참가한 방',
      password,
      type: 'group',
      createdAt: Date.now(),
      members: [myPeerId, peerId]
    };
    rooms.push(room);
  } else {
    if (!room.members.includes(myPeerId)) room.members.push(myPeerId);
    if (!room.members.includes(peerId)) room.members.push(peerId);
  }
  saveRooms();
  currentRoom = room;
  currentRoomId = roomId;
  showChatScreen(roomId);
}

// ==================== WebRTC 연결 관리 ====================
async function createLocalOfferAndSetup(role) {
  const pc = new RTCPeerConnection({ iceServers: getIceServers() });
  const dc = pc.createDataChannel('chat');
  setupDataChannelForPeer(dc, role === 'initiator' ? 'initiator' : myPeerId);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitIce(pc);
  peerConnections[role] = { pc, dc };
  return pc.localDescription;
}

async function connectToPeer(offer, peerId) {
  const pc = new RTCPeerConnection({ iceServers: getIceServers() });
  pc.ondatachannel = (event) => {
    setupDataChannelForPeer(event.channel, peerId);
  };
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce(pc);
  peerConnections[peerId] = { pc, dc: null }; // dc will be set via ondatachannel
}

function setupDataChannelForPeer(dc, peerId) {
  dc.onopen = () => {
    if (currentRoom && !currentRoom.members.includes(peerId)) {
      currentRoom.members.push(peerId);
      saveRooms();
      renderMembers();
    }
    updateConnectionStatus(true);
  };
  dc.onmessage = (e) => handleMessageFromPeer(e, peerId);
  dc.onclose = () => {
    // 연결 끊김 처리
    delete peerConnections[peerId];
    updateConnectionStatus(Object.keys(peerConnections).length > 0);
    renderMembers();
  };
}

function handleMessageFromPeer(e, peerId) {
  if (e.data instanceof ArrayBuffer) return;
  const d = JSON.parse(e.data);
  if (d.type === 'text') {
    decryptData(d).then(text => {
      const display = peerId === 'initiator' ? text : `${peerId.substring(0,6)}: ${text}`;
      addMessageToChat(display, 'other');
      addMessageToRoom(currentRoomId, { text: display, sender: peerId, time: Date.now() });
    }).catch(() => addMessageToChat('⚠️ 복호화 실패', 'system'));
  }
}

// ==================== 메시지 전송 ====================
async function sendText() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !sharedKey) return;
  const enc = await encryptData(text);
  const msgObj = { type: 'text', ...enc };
  // 모든 연결된 피어에게 전송
  Object.entries(peerConnections).forEach(([id, conn]) => {
    if (conn.dc && conn.dc.readyState === 'open') {
      conn.dc.send(JSON.stringify(msgObj));
    }
  });
  addMessageToChat(text, 'me');
  addMessageToRoom(currentRoomId, { text, sender: myPeerId, time: Date.now() });
  input.value = '';
}

// ==================== 암호화 ====================
async function deriveSharedKey(password) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
  sharedKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('p2p-chat-salt'), iterations: 100000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encryptData(data) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sharedKey, new TextEncoder().encode(data));
  return { iv: Array.from(iv), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptData(encrypted) {
  const iv = new Uint8Array(encrypted.iv);
  const ct = new Uint8Array(encrypted.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sharedKey, ct);
  return new TextDecoder().decode(plain);
}

// ==================== UI 유틸 ====================
function addMessageToChat(text, who) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (who === 'me' ? 'me' : (who === 'other' ? 'other' : ''));
  if (who === 'system') {
    div.innerHTML = `<div class="system-msg">${escapeHtml(text)}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function updateConnectionStatus(connected) {
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  dot.className = 'dot ' + (connected ? 'on' : 'off');
  label.textContent = connected ? '연결됨' : '오프라인';
}
function inviteToRoom() {
  if (!currentRoom) return;
  // 새로운 offer 생성하고 링크 표시
  createLocalOfferAndSetup('invite').then(offer => {
    const link = window.location.origin + window.location.pathname + '#room=' + currentRoom.id + '&offer=' + btoa(JSON.stringify(offer));
    prompt('초대 링크를 복사하세요 (Ctrl+C)', link);
  });
}
function leaveRoom() {
  Object.values(peerConnections).forEach(conn => conn.pc.close());
  peerConnections = {};
  currentRoomId = null;
  currentRoom = null;
  showRoomList();
  updateConnectionStatus(false);
}
function copyLink(id) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(() => alert('복사 완료!'));
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function getIceServers() {
  return [{ urls: 'stun:stun.services.mozilla.com:3478' }]; // 프라이버시 존중 STUN
}
function waitIce(pc) {
  return new Promise(r => {
    if (pc.iceGatheringState === 'complete') r();
    else pc.addEventListener('icegatheringstatechange', () => pc.iceGatheringState === 'complete' && r());
  });
}

// ==================== 초기화 및 링크 처리 ====================
window.addEventListener('hashchange', handleIncomingLink);
window.addEventListener('load', () => {
  renderRoomList();
  handleIncomingLink();
});

function handleIncomingLink() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  if (params.has('offer')) {
    const offerBase64 = params.get('offer');
    document.getElementById('joinOfferSDP').value = atob(offerBase64);
    showJoinRoom();
  }
}
</script>
