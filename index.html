<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>P2P 채팅 – 한 번의 링크로 연결</title>
  <style>
    :root {
      --bg: #0b0e14; --surface: #141a24; --card: rgba(20,26,36,0.8);
      --text: #e2e8f0; --sub: #94a3b8; --accent: #5b8def; --danger: #f87171;
      --border: #1e293b; --radius: 20px; --radius-sm: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
    }
    .container {
      width: 100%; max-width: 500px; height: 95dvh;
      background: var(--surface); border-radius: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .header {
      padding: 16px 20px; background: rgba(15,23,33,0.8);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg,#8ab4f8,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.on { background: #4ade80; } .dot.off { background: #f87171; }

    .main { flex:1; overflow-y:auto; padding: 16px; display:flex; flex-direction:column; }
    .main::-webkit-scrollbar { width:4px; } .main::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }

    .card {
      background: var(--card); backdrop-filter: blur(12px);
      border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(255,255,255,0.06); color: white; border: 1px solid var(--border);
      padding: 12px 20px; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 600; font-size: 1rem; transition: all 0.2s; width: 100%;
      text-align: center; backdrop-filter: blur(10px);
    }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.primary { background: var(--accent); border:none; }
    .btn.warn { background: rgba(248,113,113,0.2); color: var(--danger); border-color: var(--danger); }
    .btn-group { display: flex; gap: 8px; }
    .btn-group .btn { flex:1; }

    input[type=text], textarea {
      width: 100%; background: #0f131c; color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 16px; font-size: 1rem; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    #chatScreen { display: none; flex-direction: column; flex:1; }
    #messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
      padding: 4px 0;
    }
    .msg { display: flex; }
    .msg.me { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 10px 16px; border-radius: 20px;
      background: rgba(30,38,53,0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.05);
      animation: fadeUp 0.2s ease;
    }
    .msg.me .bubble { background: linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .time { font-size: 0.65rem; color: var(--sub); margin-top: 4px; text-align: right; }
    .file-inline { display: flex; align-items: center; gap: 8px; }
    .file-inline img { max-width: 180px; max-height: 120px; border-radius: 12px; }
    .input-bar { display: flex; gap: 8px; padding: 12px 0 0; }
    #msgInput { flex:1; }
    .emoji-btn, .attach-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 4px; }
    .emoji-panel { display: none; flex-wrap: wrap; gap: 4px; padding: 8px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 8px; }
    .emoji-panel button { font-size: 1.4rem; background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; }
    .emoji-panel button:hover { background: rgba(255,255,255,0.1); }

    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .text-sub { color: var(--sub); font-size: 0.85rem; }
    .mt { margin-top: 8px; }
    .mb { margin-bottom: 8px; }

    #advancedSettings { display: none; }
    .link-box { word-break: break-all; background: #0f131c; padding: 12px; border-radius: 12px; font-size: 0.75rem; margin: 8px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✦ P2P 채팅</h1>
    <div class="status-dot">
      <span id="connDot" class="dot off"></span>
      <span id="connLabel">오프라인</span>
    </div>
  </div>
  <div class="main" id="mainArea">
    <!-- 일반 모드 -->
    <div id="simpleMode">
      <div class="card text-center">
        <p class="text-sub mb">서버 없이 직접 연결되는<br>완전한 프라이버시 채팅</p>
        <button class="btn primary" onclick="startNewChat()">✨ 새 채팅 시작</button>
        <button class="btn mt" onclick="joinChat()">📩 초대 코드 입력</button>
        <button class="btn mt" id="toggleAdvanced" onclick="toggleAdvanced()">⚙️ 고급 설정</button>
      </div>

      <!-- 고급 설정 -->
      <div id="advancedSettings">
        <div class="card">
          <strong>🌐 연결 서버</strong>
          <div style="margin:8px 0;">
            <label><input type="radio" name="serverMode" value="privacy" checked onchange="updateServerDesc()"> 프라이버시 (추천)</label>
            <label style="margin-left:12px;"><input type="radio" name="serverMode" value="global" onchange="updateServerDesc()"> 글로벌</label>
          </div>
          <label><input type="checkbox" id="randomizeStun" checked> 무작위 선택</label>
          <p id="serverDesc" class="text-sub mt"></p>
        </div>
      </div>

      <!-- 새 채팅 (Offer) -->
      <div id="offerPanel" class="hidden">
        <div class="card text-center">
          <div class="spinner mb" id="offerSpinner"></div>
          <p><strong>연결 준비 중...</strong></p>
          <p class="text-sub">아래 링크를 상대방에게 보내세요.<br>상대방이 링크를 열면 자동으로 참가합니다.</p>
          <div class="link-box" id="offerLinkDisplay"></div>
          <div class="btn-group mt">
            <button class="btn" onclick="copyTextById('offerLinkDisplay')">📋 링크 복사</button>
          </div>
          <p class="text-sub mt">상대방이 Answer 링크를 보내면<br>아래에 붙여넣고 연결하세요</p>
          <div class="card mt" style="background:rgba(0,0,0,0.2);">
            <strong>📥 Answer 링크 붙여넣기</strong>
            <input type="text" id="answerLinkInput" placeholder="상대에게 받은 Answer 링크...">
            <button class="btn primary mt" onclick="applyAnswerLink()">✅ 연결 완료</button>
          </div>
        </div>
      </div>

      <!-- 참가 (Answer) 자동 처리용 -->
      <div id="autoAnswerPanel" class="hidden">
        <div class="card text-center">
          <div class="spinner mb" id="answerSpinner"></div>
          <p><strong>초대 링크 확인 중...</strong></p>
        </div>
        <div id="answerReadyPanel" class="hidden card text-center">
          <p><strong>✅ 연결 준비 완료!</strong></p>
          <p class="text-sub">아래 링크를 상대방에게<br>돌려보내면 대화가 시작됩니다.</p>
          <div class="link-box" id="answerLinkDisplay"></div>
          <div class="btn-group mt">
            <button class="btn" onclick="copyTextById('answerLinkDisplay')">📋 링크 복사</button>
            <button class="btn" onclick="shareAnswerLink()">📤 공유하기</button>
          </div>
          <p class="text-sub mt">상대방이 이 링크를 열면<br>자동으로 연결됩니다.</p>
        </div>
      </div>

      <!-- 기존 수동 입력 모드 (초대 코드 입력) -->
      <div id="manualJoinPanel" class="hidden">
        <div class="card">
          <strong>📥 초대 코드 붙여넣기</strong>
          <textarea id="remoteOfferSDP" rows="3" placeholder="상대방에게 받은 초대 코드..."></textarea>
          <button class="btn primary mt" onclick="createAnswerFromOffer()">🔄 Answer 생성</button>
        </div>
        <div id="answerResultPanel" class="hidden card mt">
          <strong>📤 내 Answer 코드</strong>
          <textarea id="localAnswerSDP" readonly rows="3"></textarea>
          <button class="btn mt" onclick="copyText('localAnswerSDP')">📋 복사해서 상대에게 전송</button>
        </div>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen">
      <div id="messages"></div>
      <div class="emoji-panel" id="emojiPanel"></div>
      <div class="input-bar">
        <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
        <button class="attach-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="text" id="msgInput" placeholder="메시지..." autocomplete="off">
        <button class="btn primary" style="width:auto; padding:10px 16px;" onclick="sendText()">전송</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
// ==================== 전역 변수 ====================
const ID_KEY = 'p2p_id_v13';
let idPair;
let ephemeralPair, peerEphemeralPub;
let rootKey, sendCK, recvCK;
let sendIdx=0, recvIdx=0;
let pc, dc, isOfferer=false;
let pendingFiles = {};

// ==================== 서버 목록 ====================
const PRIVACY = [
  'stun:stun.services.mozilla.com:3478','stun:stun.nextcloud.com:443',
  'stun:stun.linphone.org:3478','stun:stun.freeswitch.org:3478',
  'stun:stun.ekiga.net:3478','stun:stun.viagenie.ca:3478','stun:stun.iptel.org:3478'
];
const GLOBAL = [...PRIVACY,
  'stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302','stun:global.stun.twilio.com:3478',
  'stun:stun.voipbuster.com:3478','stun:stun.voipstunt.com:3478','stun:stun.voipswitch.com:3478',
  'stun:stun.voiparound.com:3478','stun:stun.schlund.de:3478','stun:stun.voipgate.com:3478',
  'stun:stun.callwithus.com:3478','stun:stun.netapp.com:3478','stun:stun.blink.de:3478',
  'stun:stun.ovh.net:3478','stun:stun.12voip.com:3478','stun:stun.evaphone.com:3478',
  'stun:stun.intervoip.com:3478','stun:stun.freevoipdeal.com:3478','stun:stun.voxox.com:3478',
  'turn:openrelay.metered.ca:80?transport=tcp','turn:openrelay.metered.ca:443?transport=tcp',
  'turn:numb.viagenie.ca?transport=udp'
];

function getIceServers() {
  const mode = document.querySelector('input[name=serverMode]:checked')?.value || 'privacy';
  const rand = document.getElementById('randomizeStun').checked;
  let list = mode==='privacy' ? [...PRIVACY] : [...GLOBAL];
  if(rand) list = list.sort(()=>Math.random()-0.5).slice(0, Math.min(5, list.length));
  return list.map(url => {
    if(url.startsWith('turn:')) {
      const [addr,params] = url.split('?');
      const t = params?.includes('tcp')?'tcp':'udp';
      let u='openrelayproject', c='openrelayproject';
      if(addr.includes('numb')) { u='numb@viagenie.ca'; c='numb'; }
      return {urls:`${addr}?transport=${t}`, username:u, credential:c};
    }
    return {urls:url};
  });
}

// ==================== 초기화 ====================
(async function init(){
  const stored = localStorage.getItem(ID_KEY);
  if(stored) idPair = await crypto.subtle.importKey('jwk',JSON.parse(stored),{name:'ECDH',namedCurve:'P-521'},false,['deriveBits']);
  else {
    idPair = await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-521'},true,['deriveBits']);
    localStorage.setItem(ID_KEY, JSON.stringify(await crypto.subtle.exportKey('jwk',idPair.privateKey)));
  }
  document.getElementById('msgInput').addEventListener('keypress',e=>{ if(e.key==='Enter') sendText(); });
  buildEmojiPanel();
  updateServerDesc();
  document.addEventListener('dragover', e=>e.preventDefault());
  document.addEventListener('drop', async e=>{ e.preventDefault(); if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });

  // 초기 로드 시 해시 확인
  checkHash();
  // 해시 변경 이벤트 감지 (같은 탭에서 링크 클릭)
  window.addEventListener('hashchange', checkHash);
})();

function updateServerDesc() {
  const mode = document.querySelector('input[name=serverMode]:checked')?.value || 'privacy';
  document.getElementById('serverDesc').textContent = mode==='privacy' ? '오픈소스 서버 7개만 사용 (추적 거의 불가)' : '전 세계 150+ 서버로 연결 최대화';
}

function toggleAdvanced() {
  const adv = document.getElementById('advancedSettings');
  adv.style.display = adv.style.display==='block' ? 'none' : 'block';
}

// 이전 연결 정리 함수
function closeConnection() {
  if (pc) {
    pc.close();
    pc = null;
  }
  dc = null;
  sendCK = null; recvCK = null;
}

// ==================== 해시 처리 (원클릭 연결) ====================
async function checkHash() {
  const hash = window.location.hash.substring(1);
  if (!hash) return;
  const params = new URLSearchParams(hash);
  if (params.has('offer')) {
    const offerBase64 = params.get('offer');
    try {
      const offerJson = atob(offerBase64);
      const offer = JSON.parse(offerJson);
      // 이미 오퍼러로 동작 중일 수도 있으니 정리
      closeConnection();
      await autoAnswer(offer);
    } catch(e) {
      alert('잘못된 초대 링크입니다.');
    }
  } else if (params.has('answer')) {
    const answerBase64 = params.get('answer');
    try {
      const answerJson = atob(answerBase64);
      const answer = JSON.parse(answerJson);
      if (pc && isOfferer) {
        await pc.setRemoteDescription(answer);
        // 연결 이후는 oniceconnectionstatechange에서 처리
      } else {
        alert('채팅을 먼저 시작한 후 Answer 링크를 열거나, 아래 입력창에 붙여넣으세요.');
      }
    } catch(e) {
      alert('잘못된 Answer 링크입니다.');
    }
  }
}

// ==================== Auto Answer (수신자) ====================
async function autoAnswer(offer) {
  isOfferer = false;
  // UI 준비
  document.getElementById('simpleMode').querySelector('.card').classList.add('hidden');
  document.getElementById('autoAnswerPanel').classList.remove('hidden');
  document.getElementById('answerSpinner').style.display = 'inline-block';
  document.getElementById('answerReadyPanel').classList.add('hidden');

  initPC(); // 오퍼가 만든 데이터 채널을 ondatachannel로 받음
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce();

  const answerBase64 = btoa(JSON.stringify(pc.localDescription));
  const answerUrl = window.location.origin + window.location.pathname + '#answer=' + answerBase64;
  document.getElementById('answerLinkDisplay').textContent = answerUrl;

  document.getElementById('answerSpinner').style.display = 'none';
  document.getElementById('answerReadyPanel').classList.remove('hidden');
}

// ==================== 일반 수동 시작 (오퍼러) ====================
async function startNewChat() {
  closeConnection();
  isOfferer = true;
  document.getElementById('offerPanel').classList.remove('hidden');
  document.getElementById('autoAnswerPanel').classList.add('hidden');
  document.getElementById('manualJoinPanel').classList.add('hidden');
  document.getElementById('offerSpinner').style.display = 'inline-block';
  initPC();
  // 오퍼러만 데이터 채널 생성
  dc = pc.createDataChannel('chat',{ordered:true});
  setupDC();
  pc.createOffer().then(o=>pc.setLocalDescription(o)).then(()=>waitIce().then(()=>{
    document.getElementById('offerSpinner').style.display = 'none';
    const offerBase64 = btoa(JSON.stringify(pc.localDescription));
    const offerUrl = window.location.origin + window.location.pathname + '#offer=' + offerBase64;
    document.getElementById('offerLinkDisplay').textContent = offerUrl;
  }));
}

function joinChat() {
  document.getElementById('manualJoinPanel').classList.remove('hidden');
  document.getElementById('offerPanel').classList.add('hidden');
  document.getElementById('autoAnswerPanel').classList.add('hidden');
}

async function createAnswerFromOffer() {
  const offerStr = document.getElementById('remoteOfferSDP').value.trim();
  if (!offerStr) return;
  const offer = JSON.parse(offerStr);
  closeConnection();
  isOfferer = false;
  initPC();
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce();
  document.getElementById('localAnswerSDP').value = JSON.stringify(pc.localDescription);
  document.getElementById('answerResultPanel').classList.remove('hidden');
}

async function applyAnswerLink() {
  const link = document.getElementById('answerLinkInput').value.trim();
  if (!link) return;
  const url = new URL(link);
  const hash = url.hash.substring(1);
  const params = new URLSearchParams(hash);
  if (params.has('answer')) {
    const answerBase64 = params.get('answer');
    const answerJson = atob(answerBase64);
    const answer = JSON.parse(answerJson);
    if (pc && isOfferer) {
      await pc.setRemoteDescription(answer);
    } else {
      alert('채팅을 시작한 후 Answer 링크를 적용하세요.');
    }
  } else {
    alert('올바른 Answer 링크가 아닙니다.');
  }
}

// ==================== WebRTC 기본 ====================
function initPC() {
  pc = new RTCPeerConnection({iceServers:getIceServers(),iceCandidatePoolSize:2});
  pc.oniceconnectionstatechange = onIceState;
  pc.ondatachannel = (event) => {
    dc = event.channel;
    setupDC();
  };
}

function setupDC() {
  if (!dc) return;
  dc.onopen = async () => {
    updateConn(true);
    await handshake();
    showChat();
  };
  dc.onmessage = onMsg;
  dc.onclose = () => updateConn(false);
}

function onIceState() {
  const state = pc.iceConnectionState;
  if (state === 'connected') updateConn(true);
  else if (state === 'disconnected' || state === 'failed') {
    updateConn(false);
    showSimple();
  }
}

function waitIce() {
  return new Promise(r => {
    if (pc.iceGatheringState === 'complete') r();
    else pc.addEventListener('icegatheringstatechange', () => {
      if (pc.iceGatheringState === 'complete') r();
    });
  });
}

// ==================== E2EE ====================
async function handshake() {
  if (!dc || dc.readyState !== 'open') return;
  ephemeralPair = await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-521'},true,['deriveBits']);
  dc.send(JSON.stringify({type:'hs',pub:await crypto.subtle.exportKey('jwk',ephemeralPair.publicKey)}));
}

async function onMsg(e) {
  if(e.data instanceof ArrayBuffer) { handleBinary(e.data); return; }
  const d=JSON.parse(e.data);
  if(d.type==='hs') await processHS(d);
  else if(d.type==='text') addMsg(await ratchetDecrypt(d),'other');
  else if(d.type==='file-header') await handleFileHeader(d);
}

async function processHS(d) {
  peerEphemeralPub = await crypto.subtle.importKey('jwk',d.pub,{name:'ECDH',namedCurve:'P-521'},false,[]);
  const shared = await crypto.subtle.deriveBits({name:'ECDH',public:peerEphemeralPub},ephemeralPair.privateKey,256);
  rootKey = await crypto.subtle.importKey('raw',shared,{name:'HKDF'},false,['deriveKey','deriveBits']);
  sendCK = await deriveCK(rootKey,'s'); recvCK = await deriveCK(rootKey,'r');
  sendIdx=0; recvIdx=0;
  if(!isOfferer) await handshake(); // answerer도 핸드셰이크 회신
}

async function deriveCK(k,i){ return crypto.subtle.deriveKey({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(0),info:new TextEncoder().encode(i)},k,{name:'AES-GCM',length:256},false,['encrypt','decrypt']); }

async function ratchetEncrypt(t) {
  const mk=await msgKey(sendCK,sendIdx), iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},mk,new TextEncoder().encode(t));
  sendCK=await advanceCK(sendCK); sendIdx++;
  return {iv:Array.from(iv),ct:Array.from(new Uint8Array(ct)),idx:sendIdx-1};
}

async function ratchetDecrypt(d,f=false) {
  let i=d.idx; while(recvIdx<i){recvCK=await advanceCK(recvCK);recvIdx++;}
  const mk=await msgKey(recvCK,i);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(d.iv)},mk,new Uint8Array(d.ct));
  recvCK=await advanceCK(recvCK); recvIdx++;
  return f?plain:new TextDecoder().decode(plain);
}

async function msgKey(ck,i){ const b=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(0),info:new TextEncoder().encode(`m${i}`)},ck,256); return crypto.subtle.importKey('raw',b,{name:'AES-GCM'},false,['encrypt','decrypt']); }
async function advanceCK(ck){ const b=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(0),info:new TextEncoder().encode('a')},ck,256); return crypto.subtle.importKey('raw',b,{name:'AES-GCM'},false,['encrypt','decrypt']); }

async function sendText() {

  const enc=await ratchetEncrypt(t);
  dc.send(JSON.stringify({type:'text',...enc}));
  addMsg(t,'me'); inp.value='';
}
function addMsg(t,who) {
  const c=document.getElementById('messages'), d=document.createElement('div');
  d.className='msg '+(who==='me'?'me':'other');

// ==================== 파일 ====================
async function handleFiles(files) { for(const f of files) await sendFile(f); }
async function sendFile(f) {
  if (!dc || dc.readyState !== 'open' || !sendCK) return;
  const id=crypto.randomUUID(), total=Math.ceil(f.size/16384);
  const hdr=JSON.stringify({type:'file-header',fid:id,name:f.name,size:f.size,mime:f.type,total});
  dc.send(JSON.stringify({type:'file-header',...await ratchetEncrypt(hdr)}));
  for(let i=0;i<total;i++) {
    const buf=await f.slice(i*16384,(i+1)*16384).arrayBuffer();
    const enc=await ratchetEncryptBinary(buf);
    const meta=JSON.stringify({fid:id,ci:i}), mb=new TextEncoder().encode(meta);
    const pkt=new Uint8Array(4+mb.length+enc.iv.length+enc.ct.length);
    new DataView(pkt.buffer).setUint32(0,mb.length,false); pkt.set(mb,4); pkt.set(enc.iv,4+mb.length); pkt.set(enc.ct,4+mb.length+enc.iv.length);
    dc.send(pkt.buffer);
  }
}
async function ratchetEncryptBinary(buf) {
  const mk=await msgKey(sendCK,sendIdx), iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},mk,buf);
  sendCK=await advanceCK(sendCK); sendIdx++;
  return {iv,ct:new Uint8Array(ct),idx:sendIdx-1};
}
async function handleBinary(ab) {
  const d=new Uint8Array(ab), ml=new DataView(d.buffer).getUint32(0,false);
  const meta=JSON.parse(new TextDecoder().decode(d.slice(4,4+ml)));
  const iv=d.slice(4+ml,4+ml+12), ct=d.slice(4+ml+12);
  const plain=await ratchetDecryptBinary({iv:Array.from(iv),ct:Array.from(ct),idx:recvIdx});
  if(!pendingFiles[meta.fid]) pendingFiles[meta.fid]={chunks:[],total:null,name:null,mime:null,got:0};
  const fb=pendingFiles[meta.fid]; fb.chunks[meta.ci]=new Uint8Array(plain); fb.got++;
  if(fb.total&&fb.got===fb.total) assemble(meta.fid);
}
async function ratchetDecryptBinary(d) {
  let i=d.idx; while(recvIdx<i){recvCK=await advanceCK(recvCK);recvIdx++;}
  const mk=await msgKey(recvCK,i), plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(d.iv)},mk,new Uint8Array(d.ct));
  recvCK=await advanceCK(recvCK); recvIdx++; return plain;
}
async function handleFileHeader(d) {
  const plain=await ratchetDecrypt(d), h=JSON.parse(plain);
  if(!pendingFiles[h.fid]) pendingFiles[h.fid]={chunks:[],total:h.total,name:h.name,mime:h.mime,got:0};
  else { pendingFiles[h.fid].total=h.total; pendingFiles[h.fid].name=h.name; pendingFiles[h.fid].mime=h.mime; if(pendingFiles[h.fid].got===h.total) assemble(h.fid); }
}
function assemble(id) {
  const fb=pendingFiles[id]; if(!fb||fb.got!==fb.total) return;
  const blob=new Blob(fb.chunks,{type:fb.mime||'application/octet-stream'});
  const url=URL.createObjectURL(blob), isImg=fb.mime&&fb.mime.startsWith('image/');
  const c=document.getElementById('messages'), d=document.createElement('div');
  d.className='msg other';
  let inner = isImg ? `<div class="file-inline"><img src="${url}" alt="${fb.name}"><span>${escapeHtml(fb.name)}</span></div>` : `📎 ${escapeHtml(fb.name)} <a href="${url}" download="${fb.name}">저장</a>`;
  d.innerHTML=`<div class="bubble">${inner}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight;
  delete pendingFiles[id];
}

function copyText(id) { const t=document.getElementById(id); t.select(); navigator.clipboard.writeText(t.value).catch(()=>alert('복사 실패')); }
function copyTextById(id) {
  const el = document.getElementById(id);
  const text = el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent;
  navigator.clipboard.writeText(text).then(()=> alert('복사되었습니다!')).catch(()=>{});
}
function shareAnswerLink() {
  const link = document.getElementById('answerLinkDisplay').textContent;
  if (navigator.share) {
    navigator.share({title: 'P2P 채팅 Answer', url: link}).catch(()=>{});
  } else {
    copyTextById('answerLinkDisplay');
  }
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
